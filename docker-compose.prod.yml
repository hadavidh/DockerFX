version: '3.9'

services:

  backend:
    image: dave67000/ict-trading-backend:latest
    container_name: forex-backend-prod
    restart: unless-stopped
    env_file: .env.prod
    expose:
      - "3001"
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trading-prod
    labels:
      - "environment=production"
      - "project=ict-trading"

  frontend:
    image: dave67000/ict-trading-frontend:latest
    container_name: forex-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - trading-prod
    labels:
      - "environment=production"
      - "project=ict-trading"

networks:
  trading-prod:
    driver: bridge
    name: trading-prod
