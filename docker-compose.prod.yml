# ║  PRODUCTION — ICT Trading Dashboard                     ║
# ║  Généré automatiquement par Terraform                   ║
# ║  Accessible sur http://135.125.196.204:80   ║
# ╚══════════════════════════════════════════════════════════╝

services:

  backend:
    image: ${BACKEND_IMAGE:-dave67000/ict-trading-backend:latest}
    restart: unless-stopped
    env_file: .env.prod
    expose:
      - "3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trading-prod
    labels:
      - "environment=production"
      - "project=ict-trading"

  frontend:
    image: ${FRONTEND_IMAGE:-dave67000/ict-trading-frontend:latest}
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - trading-prod
    labels:
      - "environment=production"
      - "project=ict-trading"

networks:
  trading-prod:
    external: true
    name: trading-prod
