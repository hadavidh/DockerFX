  <style>
    /* Prevent iOS rubber band scroll on body */
    html, body {
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    /* Safe area insets for notch/home bar */
    #root {
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-top: env(safe-area-inset-top, 0px);
    }
    /* Prevent text selection on long press */
    body {
      -webkit-user-select: none;
      user-select: text; /* override for inputs */
      -webkit-tap-highlight-color: transparent;
    }
    input, textarea {
      user-select: text;
      -webkit-user-select: text;
    }
    /* Loader initial */
    #initial-loader {
      position: fixed; inset: 0;
      background: #0F172A;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      z-index: 9999;
      transition: opacity .3s;
    }
    #initial-loader.hidden { opacity: 0; pointer-events: none; }
    .loader-logo {
      width: 72px; height: 72px; border-radius: 16px;
      background: linear-gradient(135deg, #1E3A5F, #1E40AF);
      display: flex; align-items: center; justify-content: center;
      font-family: Arial, sans-serif; font-weight: 900;
      font-size: 28px; color: white; letter-spacing: -1px;
    }
    .loader-text { color: #64748b; font-family: Arial, sans-serif; font-size: 13px; }
    .loader-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #1E40AF; margin: 0 3px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loader-dot:nth-child(2) { animation-delay: .2s; }
    .loader-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
  </style>

  <!-- ══ Register Service Worker ═══════════════════════════════ -->
  <script>
    // Masquer le loader — appelé par React OU automatiquement après 2s
    window.__hideLoader = () => {
      const el = document.getElementById('initial-loader')
      if (el) { el.classList.add('hidden'); setTimeout(() => el.remove(), 400) }
    }
    // Sécurité : masquer automatiquement après 2 secondes
    // (au cas où React tarde ou __hideLoader n'est pas appelé)
    setTimeout(window.__hideLoader, 2000)

    // Enregistrement du Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' })
          console.log('[PWA] Service Worker enregistré ✅', reg.scope)

          // Mise à jour disponible → notifier l'utilisateur
          reg.addEventListener('updatefound', () => {
            const worker = reg.installing
            if (!worker) return
            worker.addEventListener('statechange', () => {
              if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                // Nouvelle version disponible
                window.dispatchEvent(new CustomEvent('sw-update-available'))
              }
            })
          })

          // Écouter les messages du SW (navigation)
          navigator.serviceWorker.addEventListener('message', (event) => {
            if (event.data?.type === 'navigate') {
              window.dispatchEvent(new CustomEvent('sw-navigate', { detail: event.data }))
            }
          })

        } catch (err) {
          console.warn('[PWA] SW enregistrement         échoué  :', err)
        }
      })
    }
  </script>
