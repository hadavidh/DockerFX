# ════════════════════════════════════════════════════════════════
# frontend/nginx.conf
# Config Nginx dans le container frontend
# Sert les fichiers React + proxy vers le backend
# ════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Fichiers statiques React ─────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # Nécessaire pour React Router (SPA)
    }

    # ── Proxy vers le backend ────────────────────────────────────
    location /api/ {
        proxy_pass         http://forex-backend-prod:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── WebSocket ────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://forex-backend-prod:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── Webhook TradingView ──────────────────────────────────────
    location /webhook {
        proxy_pass http://forex-backend-prod:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Health check ─────────────────────────────────────────────
    location /health {
        proxy_pass http://forex-backend-prod:3001/health;
    }

    # ── Cache pour les assets statiques ─────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Sécurité : cacher la version Nginx ──────────────────────
    server_tokens off;
}