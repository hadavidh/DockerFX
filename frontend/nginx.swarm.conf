server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://ict-prod_backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
    }

    location /ws {
        proxy_pass         http://ict-prod_backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    location /webhook {
        proxy_pass http://ict-prod_backend:3001;
    }

    location /health {
        proxy_pass http://ict-prod_backend:3001/health;
    }

    server_tokens off;
}
