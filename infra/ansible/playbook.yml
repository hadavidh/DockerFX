---
# ════════════════════════════════════════════════════════════════
# infra/ansible/playbook.yml
# Configure le VPS OVH — installe Docker, déploie prod + staging
#
# Usage :
#   ansible-playbook -i inventory.yml playbook.yml
#
# Tags disponibles :
#   system, docker, firewall, dirs, config, env, swarm, staging, verify
#
# Exemples :
#   ansible-playbook -i inventory.yml playbook.yml --tags swarm
#   ansible-playbook -i inventory.yml playbook.yml --tags staging
# ════════════════════════════════════════════════════════════════

- name: Configure ICT Trading Dashboard VPS
  hosts: vps_prod
  become: true

  vars:
    project_dir: /home/ubuntu/dockerFX
    data_dir:    /home/ubuntu/dockerFX/data

  tasks:

    # ════════════════════════════════════════════════════════════
    # 1. SYSTÈME
    # ════════════════════════════════════════════════════════════

    - name: Mise à jour des paquets
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: system

    - name: Installer les utilitaires essentiels
      apt:
        name:
          - curl
          - wget
          - git
          - nano
          - htop
          - ufw
          - certbot
          - python3-certbot-nginx
        state: present
      tags: system

    # ════════════════════════════════════════════════════════════
    # 2. DOCKER
    # ════════════════════════════════════════════════════════════

    - name: Vérifier si Docker est déjà installé
      command: docker --version
      register: docker_installed
      ignore_errors: yes
      changed_when: false
      tags: docker

    - name: Installer Docker (si absent)
      shell: curl -fsSL https://get.docker.com | sh
      when: docker_installed.rc != 0
      tags: docker

    - name: Ajouter ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes
      tags: docker

    - name: Installer Docker Compose plugin
      apt:
        name: docker-compose-plugin
        state: present
      tags: docker

    - name: Démarrer et activer Docker
      systemd:
        name: docker
        state: started
        enabled: yes
      tags: docker

    # ════════════════════════════════════════════════════════════
    # 3. FIREWALL UFW
    # ════════════════════════════════════════════════════════════

    - name: Firewall — autoriser SSH
      ufw:
        rule: allow
        port: "22"
        proto: tcp
      tags: firewall

    - name: Firewall — autoriser HTTP (production)
      ufw:
        rule: allow
        port: "80"
        proto: tcp
      tags: firewall

    - name: Firewall — autoriser HTTPS
      ufw:
        rule: allow
        port: "443"
        proto: tcp
      tags: firewall

    - name: Firewall — autoriser Staging (port 8080)
      ufw:
        rule: allow
        port: "8080"
        proto: tcp
      tags: firewall

    - name: Firewall — autoriser Grafana (port 3000)
      ufw:
        rule: allow
        port: "3000"
        proto: tcp
      tags: firewall

    - name: Activer UFW
      ufw:
        state: enabled
        policy: deny
        logging: on
      tags: firewall

    # ════════════════════════════════════════════════════════════
    # 4. DOSSIERS
    # ════════════════════════════════════════════════════════════

    - name: Créer le dossier projet
      file:
        path: "{{ project_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      tags: dirs

    - name: Créer le dossier data (persistance)
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      tags: dirs

    - name: Créer le dossier nginx
      file:
        path: "{{ project_dir }}/nginx"
        state: directory
        owner: ubuntu
        group: ubuntu
      tags: dirs

    - name: Créer le dossier frontend
      file:
        path: "{{ project_dir }}/frontend"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      tags: dirs

    - name: Créer le dossier ssl
      file:
        path: "{{ project_dir }}/ssl"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0700'
      tags: dirs

    # ════════════════════════════════════════════════════════════
    # 5. COPIE DES FICHIERS DE CONFIG (générés par Terraform)
    # ════════════════════════════════════════════════════════════

    - name: Copier docker-compose.staging.yml
      copy:
        src:   "{{ playbook_dir }}/../../docker-compose.staging.yml"
        dest:  "{{ project_dir }}/docker-compose.staging.yml"
        owner: ubuntu
        group: ubuntu
        mode:  '0644'
      tags: config

    - name: Copier docker-stack.prod.yml
      copy:
        src:   "{{ playbook_dir }}/../../docker-stack.prod.yml"
        dest:  "{{ project_dir }}/docker-stack.prod.yml"
        owner: ubuntu
        group: ubuntu
        mode:  '0644'
      tags: config

#     - name: Copier nginx.conf
#       copy:
#         src:   "{{ playbook_dir }}/../../nginx/nginx.conf"
#         dest:  "{{ project_dir }}/nginx/nginx.conf"
#         owner: ubuntu
#         group: ubuntu
#         mode:  '0644'
#       tags: config

    - name: Copier nginx.staging.conf
      copy:
        src:   "{{ playbook_dir }}/../../frontend/nginx.staging.conf"
        dest:  "{{ project_dir }}/frontend/nginx.staging.conf"
        owner: ubuntu
        group: ubuntu
        mode:  '0644'
      tags: config

    # ════════════════════════════════════════════════════════════
    # 6. FICHIERS .env
    # ════════════════════════════════════════════════════════════

    - name: Vérifier si .env.prod existe
      stat:
        path: "{{ project_dir }}/.env.prod"
      register: env_prod
      tags: env

    - name: Créer .env.prod vide si absent
      copy:
        content: |
          PORT=3001
          NODE_ENV=production
        dest:  "{{ project_dir }}/.env.prod"
        owner: ubuntu
        group: ubuntu
        mode:  '0600'
      when: not env_prod.stat.exists
      tags: env

    - name: Vérifier si .env.staging existe
      stat:
        path: "{{ project_dir }}/.env.staging"
      register: env_staging
      tags: env

    - name: Créer .env.staging depuis l'exemple
      copy:
        src:   "{{ playbook_dir }}/../../.env.staging.example"
        dest:  "{{ project_dir }}/.env.staging"
        owner: ubuntu
        group: ubuntu
        mode:  '0600'
      when: not env_staging.stat.exists
      tags: env

    # ════════════════════════════════════════════════════════════
    # 7. DOCKER SWARM — Production (1 replica backend + 1 frontend)
    # ════════════════════════════════════════════════════════════

    - name: Vérifier si Swarm est déjà initialisé
      command: docker info --format '{{ '{{' }}.Swarm.LocalNodeState{{ '}}' }}'
      register: swarm_state
      changed_when: false
      become_user: ubuntu
      tags: swarm

    - name: Initialiser Docker Swarm
      command: docker swarm init --advertise-addr 135.125.196.204
      when: swarm_state.stdout != "active"
      become_user: ubuntu
      tags: swarm

    - name: Swarm initialisé — afficher statut
      debug:
        msg: "Docker Swarm actif ✅ ({{ swarm_state.stdout }})"
      tags: swarm

    - name: Pull image backend depuis DockerHub
      shell: docker pull dave67000/ict-trading-backend:latest
      become_user: ubuntu
      ignore_errors: yes
      tags: swarm

    - name: Pull image frontend depuis DockerHub
      shell: docker pull dave67000/ict-trading-frontend:latest
      become_user: ubuntu
      ignore_errors: yes
      tags: swarm

    - name: Supprimer la stack existante si présente
      shell: docker stack rm ict-prod || true
      become_user: ubuntu
      tags: swarm

    - name: Attendre que la stack soit supprimée
      shell: |
        until [ -z "$(docker service ls --filter name=ict-prod -q)" ]; do
          sleep 2
        done
      become_user: ubuntu
      tags: swarm

    - name: Déployer la stack Swarm — PRODUCTION
      shell: |
        cd {{ project_dir }}
        docker stack deploy \
          -c docker-stack.prod.yml \
          --with-registry-auth \
          ict-prod
      become_user: ubuntu
      tags: swarm

    - name: Attendre que les services Swarm démarrent
      shell: |
        docker service ls --filter name=ict-prod \
          --format "{{ '{{' }}.Replicas{{ '}}' }}"
      register: swarm_replicas
      retries: 4
      delay: 10
      until: "'0/' not in swarm_replicas.stdout"
      become_user: ubuntu
      ignore_errors: yes
      tags: swarm

    - name: Afficher l'état des services Swarm
      shell: docker service ls
      register: swarm_services
      become_user: ubuntu
      tags: swarm

    - name: Résumé services Swarm
      debug:
        msg: "{{ swarm_services.stdout_lines }}"
      tags: swarm

    # ════════════════════════════════════════════════════════════
    # 8. DOCKER COMPOSE — Staging (simple, pas de Swarm)
    # ════════════════════════════════════════════════════════════

    - name: Pull images Docker — staging
      shell: |
        cd {{ project_dir }}
        docker compose -p staging -f docker-compose.staging.yml pull
      become_user: ubuntu
      ignore_errors: yes
      tags: staging

    - name: Vérifier si le réseau Docker trading-staging existe
      shell: docker network inspect trading-staging >/dev/null 2>&1
      register: staging_network_check
      failed_when: false
      changed_when: false
      become_user: ubuntu
      tags: staging

    - name: Créer le réseau Docker trading-staging si absent
      shell: docker network create --driver bridge trading-staging
      when: staging_network_check.rc != 0
      become_user: ubuntu
      tags: staging

    - name: Redémarrer proprement le STAGING
      shell: |
        cd {{ project_dir }}
        docker compose -p staging -f docker-compose.staging.yml down --remove-orphans || true
        docker compose -p staging -f docker-compose.staging.yml up -d
      become_user: ubuntu
      tags: staging

    # ════════════════════════════════════════════════════════════
    # 9. VÉRIFICATIONS
    # ════════════════════════════════════════════════════════════

    - name: Attendre que la production HTTPS réponde (port 443)
      wait_for:
        port: 443
        host: localhost
        delay: 5
        timeout: 90
      tags: verify

    - name: Attendre que le staging réponde (port 8080)
      wait_for:
        port: 8080
        host: localhost
        delay: 5
        timeout: 60
      ignore_errors: yes
      tags: verify

    - name: Vérifier la page d'accueil production en HTTPS (origin local)
      uri:
        url: "https://127.0.0.1/"
        status_code: 200
        validate_certs: false
      retries: 5
      delay: 5
      tags: verify

    - name: Vérifier health check staging
      uri:
        url: "http://127.0.0.1:8080/health"
        status_code: 200
      retries: 5
      delay: 5
      ignore_errors: yes
      tags: verify

    # ════════════════════════════════════════════════════════════
    # 10. RÉSUMÉ FINAL
    # ════════════════════════════════════════════════════════════

    - name: Afficher le résumé final
      debug:
        msg:
          - "╔══════════════════════════════════════════════╗"
          - "║  ✅  Déploiement terminé !                   ║"
          - "╠══════════════════════════════════════════════╣"
          - "║  🟢 Production (Swarm)                       ║"
          - "║     https://dockerfx.trade                   ║"
          - "║     backend  : 2 replicas attendues          ║"
          - "║     frontend : 2 replicas attendues          ║"
          - "╠══════════════════════════════════════════════╣"
          - "║  🔵 Staging (Compose)                        ║"
          - "║     http://localhost:8080                    ║"
          - "╠══════════════════════════════════════════════╣"
          - "║  📊 Grafana                                  ║"
          - "║     http://localhost:3000                    ║"
          - "╠══════════════════════════════════════════════╣"
          - "║  🐳 Swarm scaling :                          ║"
          - "║  docker service scale ict-prod_backend=3     ║"
          - "╚══════════════════════════════════════════════╝"
      tags: always