---
# ════════════════════════════════════════════════════════════════
# infra/ansible/playbook.yml
# Déploie :
# - PROD sur Docker Swarm derrière un gateway Nginx hôte
# - STAGING sur Docker Compose derrière le même gateway
# - MONITORING Prometheus + Grafana + cAdvisor + Node Exporter
# Accès final :
# - https://dockerfx.trade
# - https://staging.dockerfx.trade
# - http://135.125.196.204:3000 (Grafana)
# ════════════════════════════════════════════════════════════════

- name: Configure ICT Trading Dashboard VPS
  hosts: vps_prod
  become: true

  vars:
    project_dir: /home/ubuntu/dockerFX
    data_dir:    /home/ubuntu/dockerFX/data

  tasks:

    # ════════════════════════════════════════════════════════════
    # 1. SYSTÈME
    # ════════════════════════════════════════════════════════════

    - name: Mise à jour des paquets
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: system

    - name: Installer les utilitaires essentiels
      apt:
        name:
          - curl
          - wget
          - git
          - nano
          - htop
          - ufw
          - nginx
          - python3-certbot-nginx
        state: present
      tags: system

    # ════════════════════════════════════════════════════════════
    # 2. DOCKER
    # ════════════════════════════════════════════════════════════

    - name: Vérifier si Docker est déjà installé
      command: docker --version
      register: docker_installed
      ignore_errors: yes
      changed_when: false
      tags: docker

    - name: Installer Docker (si absent)
      shell: curl -fsSL https://get.docker.com | sh
      when: docker_installed.rc != 0
      tags: docker

    - name: Ajouter ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes
      tags: docker

    - name: Installer Docker Compose plugin
      apt:
        name: docker-compose-plugin
        state: present
      tags: docker

    - name: Démarrer et activer Docker
      systemd:
        name: docker
        state: started
        enabled: yes
      tags: docker

    # ════════════════════════════════════════════════════════════
    # 3. FIREWALL UFW
    # ════════════════════════════════════════════════════════════

    - name: Firewall — autoriser SSH
      ufw:
        rule: allow
        port: "22"
        proto: tcp
      tags: firewall

    - name: Firewall — autoriser HTTP public
      ufw:
        rule: allow
        port: "80"
        proto: tcp
      tags: firewall

    - name: Firewall — autoriser HTTPS public
      ufw:
        rule: allow
        port: "443"
        proto: tcp
      tags: firewall

    - name: Firewall — retirer exposition publique staging 8080 si présente
      ufw:
        rule: allow
        port: "8080"
        proto: tcp
        delete: yes
      ignore_errors: yes
      tags: firewall

    - name: Firewall — autoriser Grafana (port 3000)
      ufw:
        rule: allow
        port: "3000"
        proto: tcp
      tags: firewall

    - name: Activer UFW
      ufw:
        state: enabled
        policy: deny
        logging: on
      tags: firewall

    # ════════════════════════════════════════════════════════════
    # 4. DOSSIERS
    # ════════════════════════════════════════════════════════════

    - name: Créer le dossier projet
      file:
        path: "{{ project_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      tags: dirs

    - name: Créer le dossier data
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      tags: dirs

    - name: Créer le dossier frontend
      file:
        path: "{{ project_dir }}/frontend"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      tags: dirs

    - name: Créer le dossier ssl
      file:
        path: "{{ project_dir }}/ssl"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0700'
      tags: dirs

    - name: Créer les dossiers monitoring
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - "{{ project_dir }}/monitoring"
        - "{{ project_dir }}/monitoring/grafana"
        - "{{ project_dir }}/monitoring/grafana/provisioning"
        - "{{ project_dir }}/monitoring/grafana/provisioning/datasources"
        - "{{ project_dir }}/monitoring/grafana/provisioning/dashboards"
        - "{{ project_dir }}/monitoring/grafana/dashboards"
      tags: dirs, monitoring

    # ════════════════════════════════════════════════════════════
    # 5. VÉRIFICATION CERTIFICATS
    # ════════════════════════════════════════════════════════════

    - name: Vérifier la présence du certificat Cloudflare Origin
      stat:
        path: "{{ project_dir }}/ssl/cloudflare-origin.crt"
      register: ssl_cert_stat
      tags: config

    - name: Vérifier la présence de la clé privée Cloudflare Origin
      stat:
        path: "{{ project_dir }}/ssl/cloudflare-origin.key"
      register: ssl_key_stat
      tags: config

    - name: Échouer si les certificats HTTPS prod sont absents
      fail:
        msg: >-
          Certificats HTTPS manquants dans {{ project_dir }}/ssl.
          Fichiers attendus : cloudflare-origin.crt et cloudflare-origin.key
      when: not ssl_cert_stat.stat.exists or not ssl_key_stat.stat.exists
      tags: config

    # ════════════════════════════════════════════════════════════
    # 6. COPIE DES FICHIERS GÉNÉRÉS
    # ════════════════════════════════════════════════════════════

    - name: Copier docker-compose.staging.yml
      copy:
        src:   "{{ playbook_dir }}/../../docker-compose.staging.yml"
        dest:  "{{ project_dir }}/docker-compose.staging.yml"
        owner: ubuntu
        group: ubuntu
        mode:  '0644'
      tags: config

    - name: Copier docker-stack.prod.yml
      copy:
        src:   "{{ playbook_dir }}/../../docker-stack.prod.yml"
        dest:  "{{ project_dir }}/docker-stack.prod.yml"
        owner: ubuntu
        group: ubuntu
        mode:  '0644'
      tags: config

    - name: Copier dockerfx-gateway.conf
      copy:
        src:   "{{ playbook_dir }}/../../dockerfx-gateway.conf"
        dest:  "{{ project_dir }}/dockerfx-gateway.conf"
        owner: ubuntu
        group: ubuntu
        mode:  '0644'
      tags: config

    - name: Copier nginx.staging.conf
      copy:
        src:   "{{ playbook_dir }}/../../frontend/nginx.staging.conf"
        dest:  "{{ project_dir }}/frontend/nginx.staging.conf"
        owner: ubuntu
        group: ubuntu
        mode:  '0644'
      tags: config

    # ════════════════════════════════════════════════════════════
    # 7. GATEWAY NGINX HÔTE
    # ════════════════════════════════════════════════════════════

    - name: Installer la conf gateway dans sites-available
      copy:
        src:   "{{ project_dir }}/dockerfx-gateway.conf"
        dest:  "{{ gateway_conf_path }}"
        remote_src: true
        owner: root
        group: root
        mode:  '0644'
      tags: gateway

    - name: Activer la conf gateway
      file:
        src: "{{ gateway_conf_path }}"
        dest: /etc/nginx/sites-enabled/dockerfx-gateway.conf
        state: link
        force: true
      tags: gateway

    - name: Désactiver le site Nginx par défaut
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      tags: gateway

    - name: Valider la configuration Nginx hôte
      command: nginx -t
      changed_when: false
      tags: gateway

    - name: Démarrer et recharger Nginx hôte
      systemd:
        name: nginx
        state: reloaded
        enabled: yes
      tags: gateway

    # ════════════════════════════════════════════════════════════
    # 8. FICHIERS .env
    # ════════════════════════════════════════════════════════════

    - name: Vérifier si .env.prod existe
      stat:
        path: "{{ project_dir }}/.env.prod"
      register: env_prod
      tags: env

    - name: Créer .env.prod vide si absent
      copy:
        content: |
          PORT=3001
          NODE_ENV=production
        dest:  "{{ project_dir }}/.env.prod"
        owner: ubuntu
        group: ubuntu
        mode:  '0600'
      when: not env_prod.stat.exists
      tags: env

    - name: Vérifier si .env.staging existe
      stat:
        path: "{{ project_dir }}/.env.staging"
      register: env_staging
      tags: env

    - name: Créer .env.staging depuis l'exemple
      copy:
        src:   "{{ playbook_dir }}/../../.env.staging.example"
        dest:  "{{ project_dir }}/.env.staging"
        owner: ubuntu
        group: ubuntu
        mode:  '0600'
      when: not env_staging.stat.exists
      tags: env

    # ════════════════════════════════════════════════════════════
    # 9. SWARM PROD
    # ════════════════════════════════════════════════════════════

    - name: Vérifier si Swarm est déjà initialisé
      command: docker info --format '{{ "{{" }}.Swarm.LocalNodeState{{ "}}" }}'
      register: swarm_state
      changed_when: false
      become_user: ubuntu
      tags: swarm

    - name: Initialiser Docker Swarm si nécessaire
      shell: docker swarm init || true
      when: swarm_state.stdout != "active"
      become_user: ubuntu
      tags: swarm

    - name: Pull image backend depuis DockerHub
      shell: docker pull {{ backend_image }}:latest
      become_user: ubuntu
      ignore_errors: yes
      tags: swarm

    - name: Pull image frontend depuis DockerHub
      shell: docker pull {{ frontend_image }}:latest
      become_user: ubuntu
      ignore_errors: yes
      tags: swarm

    - name: Supprimer la stack existante si présente
      shell: docker stack rm ict-prod || true
      become_user: ubuntu
      tags: swarm

    - name: Attendre que la stack soit supprimée
      shell: |
        until [ -z "$(docker service ls --filter name=ict-prod -q)" ]; do
          sleep 2
        done
      become_user: ubuntu
      tags: swarm

    - name: Déployer la stack Swarm — PRODUCTION gateway-ready
      shell: |
        cd {{ project_dir }}
        docker stack deploy \
          -c docker-stack.prod.yml \
          --with-registry-auth \
          ict-prod
      become_user: ubuntu
      tags: swarm

    - name: Attendre que les services Swarm démarrent
      shell: |
        docker service ls --filter name=ict-prod \
          --format "{{ '{{' }}.Replicas{{ '}}' }}"
      register: swarm_replicas
      retries: 8
      delay: 15
      until: "'0/' not in swarm_replicas.stdout"
      become_user: ubuntu
      ignore_errors: yes
      tags: swarm

    - name: Afficher l'état des services Swarm
      shell: docker service ls
      register: swarm_services
      become_user: ubuntu
      tags: swarm

    - name: Résumé services Swarm
      debug:
        msg: "{{ swarm_services.stdout_lines }}"
      tags: swarm

    - name: Afficher le détail du frontend Swarm
      shell: docker service ps ict-prod_frontend --no-trunc
      register: swarm_frontend_ps
      become_user: ubuntu
      changed_when: false
      tags: swarm

    - name: Résumé détail frontend Swarm
      debug:
        msg: "{{ swarm_frontend_ps.stdout_lines }}"
      tags: swarm

    - name: Afficher les logs récents du frontend Swarm si réplica KO
      shell: docker service logs ict-prod_frontend --since 10m
      register: swarm_frontend_logs
      become_user: ubuntu
      changed_when: false
      failed_when: false
      when: "'0/' in swarm_replicas.stdout"
      tags: swarm

    - name: Résumé logs frontend Swarm si réplica KO
      debug:
        msg: "{{ swarm_frontend_logs.stdout_lines | default([]) }}"
      when: "'0/' in swarm_replicas.stdout"
      tags: swarm

    - name: Échouer si le frontend Swarm n'est pas prêt
      fail:
        msg: >-
          Le frontend Swarm n'est pas prêt.
          Vérifier docker service ps ict-prod_frontend --no-trunc
          et docker service logs ict-prod_frontend --since 10m
      when: "'0/' in swarm_replicas.stdout"
      tags: swarm

    # ════════════════════════════════════════════════════════════
    # 10. COMPOSE STAGING
    # ════════════════════════════════════════════════════════════

    - name: Pull images Docker — staging
      shell: |
        cd {{ project_dir }}
        docker compose -p staging -f docker-compose.staging.yml pull
      become_user: ubuntu
      ignore_errors: yes
      tags: staging

    - name: Vérifier si le réseau Docker trading-staging existe
      shell: docker network inspect trading-staging >/dev/null 2>&1
      register: staging_network_check
      failed_when: false
      changed_when: false
      become_user: ubuntu
      tags: staging

    - name: Créer le réseau Docker trading-staging si absent
      shell: docker network create --driver bridge trading-staging
      when: staging_network_check.rc != 0
      become_user: ubuntu
      tags: staging

    - name: Redémarrer proprement le STAGING
      shell: |
        cd {{ project_dir }}
        docker compose -p staging -f docker-compose.staging.yml down --remove-orphans || true
        docker compose -p staging -f docker-compose.staging.yml up -d
      become_user: ubuntu
      tags: staging

    # ════════════════════════════════════════════════════════════
    # 11. VÉRIFICATIONS PROD + STAGING
    # ════════════════════════════════════════════════════════════

    - name: Attendre que le gateway HTTPS réponde
      wait_for:
        port: 443
        host: localhost
        delay: 5
        timeout: 90
      tags: verify

    - name: Attendre que l'origin prod HTTPS réponde (8443)
      wait_for:
        port: "{{ prod_origin_https_port }}"
        host: localhost
        delay: 5
        timeout: 90
      tags: verify

    - name: Attendre que l'origin staging réponde (8080)
      wait_for:
        port: "{{ staging_port }}"
        host: localhost
        delay: 5
        timeout: 60
      ignore_errors: yes
      tags: verify

    - name: Vérifier la page d'accueil production via gateway
      uri:
        url: "https://127.0.0.1/"
        headers:
          Host: "{{ domain_name }}"
        status_code: 200
        validate_certs: false
      register: prod_gateway_check
      retries: 8
      delay: 5
      until: prod_gateway_check.status == 200
      tags: verify

    - name: Vérifier la page d'accueil staging via gateway
      uri:
        url: "https://127.0.0.1/"
        headers:
          Host: "{{ staging_domain }}"
        status_code: 200
        validate_certs: false
      register: staging_gateway_check
      retries: 8
      delay: 5
      until: staging_gateway_check.status == 200
      ignore_errors: yes
      tags: verify

    - name: Vérifier health check staging origin local
      uri:
        url: "http://127.0.0.1:{{ staging_port }}/health"
        status_code: 200
      retries: 5
      delay: 5
      ignore_errors: yes
      tags: verify

    # ════════════════════════════════════════════════════════════
    # 12. MONITORING — Prometheus + Grafana + cAdvisor + Node Exporter
    # ════════════════════════════════════════════════════════════

    - name: Copier prometheus.yml
      copy:
        src:   "{{ playbook_dir }}/../../monitoring/prometheus.yml"
        dest:  "{{ project_dir }}/monitoring/prometheus.yml"
        owner: ubuntu
        group: ubuntu
        mode:  '0644'
      tags: monitoring

    - name: Copier datasource Grafana
      copy:
        src:   "{{ playbook_dir }}/../../monitoring/grafana/provisioning/datasources/datasource.yml"
        dest:  "{{ project_dir }}/monitoring/grafana/provisioning/datasources/datasource.yml"
        owner: ubuntu
        group: ubuntu
        mode:  '0644'
      tags: monitoring

    - name: Copier provisioning dashboards Grafana
      copy:
        src:   "{{ playbook_dir }}/../../monitoring/grafana/provisioning/dashboards/dashboards.yml"
        dest:  "{{ project_dir }}/monitoring/grafana/provisioning/dashboards/dashboards.yml"
        owner: ubuntu
        group: ubuntu
        mode:  '0644'
      tags: monitoring

    - name: Copier dashboard JSON ICT Trading
      copy:
        src:   "{{ playbook_dir }}/../../monitoring/grafana/dashboards/ict-trading.json"
        dest:  "{{ project_dir }}/monitoring/grafana/dashboards/ict-trading.json"
        owner: ubuntu
        group: ubuntu
        mode:  '0644'
      tags: monitoring

    - name: Copier docker-compose.monitoring.yml
      copy:
        src:   "{{ playbook_dir }}/../../docker-compose.monitoring.yml"
        dest:  "{{ project_dir }}/docker-compose.monitoring.yml"
        owner: ubuntu
        group: ubuntu
        mode:  '0644'
      tags: monitoring

    - name: Arrêter ancienne stack monitoring si présente
      shell: |
        cd {{ project_dir }}
        docker compose -p monitoring -f docker-compose.monitoring.yml down --remove-orphans || true
      become_user: ubuntu
      tags: monitoring

    - name: Pull + démarrer la stack monitoring
      shell: |
        cd {{ project_dir }}
        docker compose -p monitoring -f docker-compose.monitoring.yml pull --quiet
        docker compose -p monitoring -f docker-compose.monitoring.yml up -d
      become_user: ubuntu
      tags: monitoring

    - name: Attendre démarrage Grafana (port 3000)
      wait_for:
        port: "{{ grafana_port }}"
        host: localhost
        delay: 15
        timeout: 90
      tags: monitoring

    - name: Vérifier healthcheck Grafana
      uri:
        url: "http://localhost:{{ grafana_port }}/api/health"
        status_code: 200
      register: grafana_health
      retries: 6
      delay: 5
      until: grafana_health.status == 200
      tags: monitoring

    - name: Vérifier que le dashboard ICT Trading est provisionné
      uri:
        url: "http://localhost:{{ grafana_port }}/api/search?query=ICT+Trading"
        user: "{{ grafana_admin_user }}"
        password: "{{ grafana_admin_password }}"
        force_basic_auth: yes
        status_code: 200
      register: grafana_dash
      retries: 3
      delay: 10
      ignore_errors: yes
      tags: monitoring

    - name: État containers monitoring
      shell: |
        docker compose -p monitoring \
          -f {{ project_dir }}/docker-compose.monitoring.yml \
          ps --format "table {{ '{{' }}.Name{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}"
      register: monitoring_ps
      become_user: ubuntu
      changed_when: false
      tags: monitoring

    - name: Résumé monitoring
      debug:
        msg: "{{ monitoring_ps.stdout_lines }}"
      tags: monitoring

    # ════════════════════════════════════════════════════════════
    # 13. RÉSUMÉ FINAL
    # ════════════════════════════════════════════════════════════

    - name: Afficher le résumé final
      debug:
        msg:
          - "╔════════════════════════════════════════════════════╗"
          - "║  ✅  Déploiement gateway-ready terminé !          ║"
          - "╠════════════════════════════════════════════════════╣"
          - "║  🟢 Production (Swarm)                             ║"
          - "║     https://{{ domain_name }}                      ║"
          - "║     origin local : https://127.0.0.1:{{ prod_origin_https_port }} ║"
          - "╠════════════════════════════════════════════════════╣"
          - "║  🔵 Staging (Compose)                              ║"
          - "║     https://{{ staging_domain }}                   ║"
          - "║     origin local : http://127.0.0.1:{{ staging_port }} ║"
          - "╠════════════════════════════════════════════════════╣"
          - "║  📊 Grafana Monitoring                             ║"
          - "║     http://{{ ansible_host }}:{{ grafana_port }}   ║"
          - "║     Login : {{ grafana_admin_user }} / ***         ║"
          - "║     Dashboard : ICT Trading Dashboard — Monitoring ║"
          - "╠════════════════════════════════════════════════════╣"
          - "║  🐳 Gateway Nginx hôte                             ║"
          - "║     /etc/nginx/sites-available/dockerfx-gateway.conf ║"
          - "╚════════════════════════════════════════════════════╝"
      tags: always