# ╔══════════════════════════════════════════════════════════╗
# ║  STAGING — ICT Trading Dashboard                        ║
# ║  Généré automatiquement par Terraform                   ║
# ║  Accessible sur http://135.125.196.204:8080 ║
# ╚══════════════════════════════════════════════════════════╝

services:

  backend:
    image: ${BACKEND_IMAGE:-dave67000/ict-trading-backend:develop}
    restart: unless-stopped
    env_file: .env.staging
    expose:
      - "3002"
    environment:
      - PORT=3002
      - NODE_ENV=staging
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trading-staging
    labels:
      - "environment=staging"
      - "project=ict-trading"

  frontend:
    image: ${FRONTEND_IMAGE:-dave67000/ict-trading-frontend:develop}
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - trading-staging
    labels:
      - "environment=staging"
      - "project=ict-trading"

networks:
  trading-staging:
    external: true
    name: trading-staging
