# ╔══════════════════════════════════════════════════════════╗
# ║  STAGING — ICT Trading Dashboard (GATEWAY READY)        ║
# ║  Généré automatiquement par Terraform                   ║
# ║  Accès public : https://staging.dockerfx.trade           ║
# ║  Origin local : http://127.0.0.1:8080    ║
# ╚══════════════════════════════════════════════════════════╝

services:

  backend:
    image: dave67000/ict-trading-backend:develop
    container_name: forex-backend-staging
    restart: unless-stopped
    env_file: .env.staging
    expose:
      - "3002"
    environment:
      - PORT=3002
      - NODE_ENV=staging
    healthcheck:
      test: ["CMD","wget","-qO-","http://127.0.0.1:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trading-staging
    labels:
      - "environment=staging"
      - "project=ict-trading"

  frontend:
    image: dave67000/ict-trading-frontend:develop
    container_name: forex-frontend-staging
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./frontend/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - trading-staging
    labels:
      - "environment=staging"
      - "project=ict-trading"

networks:
  trading-staging:
    external: true
    name: trading-staging
