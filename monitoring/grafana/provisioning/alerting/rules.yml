apiVersion: 1
groups:
  - orgId: 1
    name: critical
    folder: ICT Trading
    interval: 1m
    rules:
      - uid: ctrader-disconnected-uid
        title: "cTrader Déconnecté"
        condition: C
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "cTrader déconnecté depuis 5 minutes"
          description: "Les ordres AUTO sont en SIMULATION."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: trading_ctrader_connected
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
  - orgId: 1
    name: infrastructure
    folder: ICT Trading
    interval: 1m
    rules:
      - uid: ram-backend-critical-uid
        title: "RAM Backend Critique"
        condition: C
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "RAM backend critique (270Mo/300Mo)"
          description: "Container proche de la limite Docker. OOM Kill imminent."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: "container_memory_usage_bytes{name=~\"ict-prod_backend.*\"} / 1024 / 1024"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [270]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
      - uid: container-restart-uid
        title: "Container Restart Inattendu"
        condition: C
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Container ict-prod a redémarré"
          description: "Vérifier : docker service logs ict-prod_backend --tail 50"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: "increase(container_start_time_seconds{name=~\"ict-prod.*\"}[10m])"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
