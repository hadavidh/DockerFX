version: '3.9'
 
services:
  backend:
    build: ./backend
    container_name: forex-backend
    restart: unless-stopped
    environment:
      PORT:                   3001
      TELEGRAM_TOKEN:         ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHATID:        ${TELEGRAM_CHATID:-}
      CTRADER_CLIENT_ID:      ${CTRADER_CLIENT_ID:-}
      CTRADER_CLIENT_SECRET:  ${CTRADER_CLIENT_SECRET:-}
      CTRADER_ACCESS_TOKEN:   ${CTRADER_ACCESS_TOKEN:-}
      CTRADER_ACCOUNT_ID:     ${CTRADER_ACCOUNT_ID:-}
    expose:
      - "3001"
    healthcheck:
      test:     ["CMD","wget","-qO-","http://localhost:3001/health"]
      interval: 30s
      timeout:  5s
      retries:  3
    networks:
      - trading
 
  frontend:
    build: ./frontend
    container_name: forex-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - trading
 
networks:
  trading:
    driver: bridge
 