# ╔══════════════════════════════════════════════════════════╗
# ║  NGINX — Reverse Proxy                                  ║
# ║  Généré automatiquement par Terraform                   ║
# ║  Production  : http://135.125.196.204                     ║
# ║  Staging     : http://135.125.196.204:8080               ║
# ╚══════════════════════════════════════════════════════════╝

events {
  worker_connections 1024;
}

http {

  # ── PRODUCTION (:80) ───────────────────────────────────
  server {
    listen 80;
    server_name 135.125.196.204;

    # Frontend React
    location / {
      proxy_pass         http://forex-frontend-prod:80;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # API Backend
    location /api/ {
      proxy_pass         http://forex-backend-prod:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_read_timeout 60s;
    }

    # WebSocket
    location /ws {
      proxy_pass         http://forex-backend-prod:3001;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_read_timeout 3600s;
    }

    # Webhook TradingView
    location /webhook {
      proxy_pass         http://forex-backend-prod:3001;
      proxy_http_version 1.1;
    }

    # Health check
    location /health {
      proxy_pass http://forex-backend-prod:3001/health;
    }
  }

  # ── STAGING (:8080) ─────────────────────────────────
  server {
    listen 8080;
    server_name 135.125.196.204;

    # Bandeau staging visible dans les headers
    add_header X-Environment "staging" always;

    location / {
      proxy_pass         http://forex-frontend-staging:80;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }

    location /api/ {
      proxy_pass         http://forex-backend-staging:3002;
      proxy_http_version 1.1;
    }

    location /ws {
      proxy_pass         http://forex-backend-staging:3002;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }

    location /webhook {
      proxy_pass http://forex-backend-staging:3002;
    }

    location /health {
      proxy_pass http://forex-backend-staging:3002/health;
    }
  }
}
