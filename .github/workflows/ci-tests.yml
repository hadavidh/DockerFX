name: CI - Tests Robot

on:
  push:
    branches:
      - develop
      - main
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ══════════════════════════════════════════════════════════════
  # JOB 1 — LINT
  # ══════════════════════════════════════════════════════════════
  lint:
    name: Analyse ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Installer les dépendances backend
        working-directory: backend
        run: npm ci

      - name: Analyser le code backend avec ESLint
        working-directory: backend
        run: npm run lint

      - name: Installer les dépendances frontend
        working-directory: frontend
        run: npm ci

      - name: Analyser le code frontend avec ESLint
        working-directory: frontend
        run: npm run lint

  # ══════════════════════════════════════════════════════════════
  # JOB 2 — TRIVY SCAN
  # ══════════════════════════════════════════════════════════════
  trivy-scan:
    name: Analyse de sécurité Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Analyser la sécurité du dépôt
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

  # ══════════════════════════════════════════════════════════════
  # JOB 3 — ROBOT TESTS
  # ══════════════════════════════════════════════════════════════
  robot-tests:
    name: Tests Robot Framework
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs:
      - lint
      - trivy-scan
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances Robot Framework
        run: |
          python -m pip install --upgrade pip
          pip install \
            robotframework==7.0 \
            robotframework-seleniumlibrary==6.3.0 \
            robotframework-requests==0.9.7 \
            robotframework-jsonlibrary==0.5.0 \
            robotframework-pabot==2.18.0 \
            webdriver-manager

      - name: Installer Chrome et les outils
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable curl wget
          DRIVER_PATH=$(python -c "from webdriver_manager.chrome import ChromeDriverManager; print(ChromeDriverManager().install())")
          sudo ln -sf "$DRIVER_PATH" /usr/local/bin/chromedriver
          google-chrome --version
          chromedriver --version

      - name: Valider les secrets requis
        env:
          RF_USERNAME: ${{ secrets.TEST_DASHBOARD_LOGIN }}
          RF_PASSWORD: ${{ secrets.TEST_DASHBOARD_PASSWORD }}
        run: |
          test -n "$RF_USERNAME" || (echo "Secret manquant: TEST_DASHBOARD_LOGIN" && exit 1)
          test -n "$RF_PASSWORD" || (echo "Secret manquant: TEST_DASHBOARD_PASSWORD" && exit 1)

      - name: Préparer les variables Robot Framework
        env:
          RF_USERNAME: ${{ secrets.TEST_DASHBOARD_LOGIN }}
          RF_PASSWORD: ${{ secrets.TEST_DASHBOARD_PASSWORD }}
        run: |
          python - <<'PY'
          import os
          with open('/tmp/rf_vars.py', 'w', encoding='utf-8') as f:
              f.write("USERNAME_VALUE = " + repr(os.environ["RF_USERNAME"]) + "\n")
              f.write("PASSWORD_VALUE = " + repr(os.environ["RF_PASSWORD"]) + "\n")
          print("Fichier /tmp/rf_vars.py créé")
          PY

      - name: Démarrer l’environnement CI
        env:
          DASHBOARD_LOGIN: ${{ secrets.TEST_DASHBOARD_LOGIN }}
          DASHBOARD_PASSWORD: ${{ secrets.TEST_DASHBOARD_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHATID: ${{ secrets.TELEGRAM_CHATID }}
          CTRADER_CLIENT_ID: ${{ secrets.CTRADER_CLIENT_ID }}
          CTRADER_CLIENT_SECRET: ${{ secrets.CTRADER_CLIENT_SECRET }}
          CTRADER_ACCESS_TOKEN: ${{ secrets.CTRADER_ACCESS_TOKEN }}
          CTRADER_ACCOUNT_ID: ${{ secrets.CTRADER_ACCOUNT_ID }}
          CTRADER_HOST: ${{ secrets.CTRADER_HOST }}
          CTRADER_ACCOUNT_DEMO: ${{ secrets.CTRADER_ACCOUNT_DEMO }}
          CTRADER_ACCOUNT_LIVE: ${{ secrets.CTRADER_ACCOUNT_LIVE }}
        run: |
          docker compose -f docker-compose.ci.yml up -d --build

      - name: Attendre le backend
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:3003/health > /dev/null; then
              echo "Backend prêt"
              exit 0
            fi
            echo "Attente du backend ($i/40)..."
            docker compose -f docker-compose.ci.yml ps || true
            sleep 3
          done
          docker compose -f docker-compose.ci.yml logs --no-color backend
          exit 1

      - name: Déboguer l’environnement backend
        run: |
          docker compose -f docker-compose.ci.yml exec -T backend sh -c 'echo "LOGIN=$DASHBOARD_LOGIN"; echo "PASS_LEN=${#DASHBOARD_PASSWORD}"'

      - name: Déboguer la connexion API directe au backend
        env:
          RF_USERNAME: ${{ secrets.TEST_DASHBOARD_LOGIN }}
          RF_PASSWORD: ${{ secrets.TEST_DASHBOARD_PASSWORD }}
        run: |
          echo "=== Connexion API directe ==="
          curl -i -s -X POST http://127.0.0.1:3003/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$RF_USERNAME\",\"password\":\"$RF_PASSWORD\"}"

      - name: Attendre le frontend
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8085 > /dev/null; then
              echo "Frontend prêt"
              exit 0
            fi
            echo "Attente du frontend ($i/40)..."
            docker compose -f docker-compose.ci.yml ps || true
            sleep 3
          done
          docker compose -f docker-compose.ci.yml logs --no-color frontend
          exit 1

      - name: Déboguer la connexion API via le proxy frontend
        env:
          RF_USERNAME: ${{ secrets.TEST_DASHBOARD_LOGIN }}
          RF_PASSWORD: ${{ secrets.TEST_DASHBOARD_PASSWORD }}
        run: |
          echo "=== Frontend /api/auth/login ==="
          curl -i -s -X POST http://127.0.0.1:8085/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$RF_USERNAME\",\"password\":\"$RF_PASSWORD\"}"

      - name: Préparer les rapports
        run: |
          rm -rf reports
          mkdir -p reports/api reports/ui reports/final

      - name: Exécuter les tests API
        run: |
          python -m robot \
            --nostatusrc \
            --outputdir reports/api \
            --output output.xml \
            --log log.html \
            --report report.html \
            --xunit xunit.xml \
            --variable API_URL:http://127.0.0.1:3003 \
            --variablefile /tmp/rf_vars.py \
            tests/robot/suites/api_tests.robot

      - name: Exécuter les tests UI
        run: |
          python -m robot \
            --nostatusrc \
            --outputdir reports/ui \
            --output output.xml \
            --log log.html \
            --report report.html \
            --xunit xunit.xml \
            --variable URL:http://127.0.0.1:8085 \
            --variable BROWSER:headlesschrome \
            --variable TIMEOUT:30s \
            --variablefile /tmp/rf_vars.py \
            tests/robot/suites/dashboard_tests.robot

      - name: Fusionner les rapports et échouer en cas de test en erreur
        run: |
          python -m robot.rebot \
            --outputdir reports/final \
            --output output.xml \
            --log log.html \
            --report report.html \
            --xunit xunit.xml \
            --name "Suite complète Robot" \
            reports/api/output.xml \
            reports/ui/output.xml

      - name: Lister les rapports générés
        if: always()
        run: |
          find reports -type f | sort

      - name: Publier les rapports finaux
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-final-report-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: |
            reports/final/
            reports/ui/
            reports/api/
          retention-days: 30
          if-no-files-found: warn

      - name: Afficher les logs Docker du backend
        if: always()
        run: docker compose -f docker-compose.ci.yml logs --no-color backend

      - name: Afficher les logs Docker du frontend
        if: always()
        run: docker compose -f docker-compose.ci.yml logs --no-color frontend

      - name: Supprimer l’environnement CI
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v --remove-orphans