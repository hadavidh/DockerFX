# ════════════════════════════════════════════════════════════════
# .github/workflows/ci-cd.yml
# Pipeline CI/CD — ICT Trading Dashboard
#
# Déclencheur : push sur branches feature/* ou pull_request → main
#
# Étapes :
#   1. Tests Robot Framework (Selenium + Chrome headless)
#   2. Si tests OK → Build images Docker
#   3. Push images vers DockerHub
#   4. Notification résultat (succès/échec)
# ════════════════════════════════════════════════════════════════

name: CI/CD — Tests + Docker Build

on:
  push:
    branches:
      - 'feature/**'
      - 'develop'
      - 'main'
  pull_request:
    branches:
      - main

env:
  DOCKERHUB_USERNAME:  ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_BACKEND:       ${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-backend
  IMAGE_FRONTEND:      ${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-frontend

jobs:

  # ══════════════════════════════════════════════════════════════
  # JOB 1 — Tests Robot Framework (frontend E2E)
  # ══════════════════════════════════════════════════════════════
  robot-tests:
    name: 🤖 Robot Framework Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # ✅ FIX : Suppression du bloc "services: backend"
    # Le service node:20-alpine démarrait une image VIDE sans ton code,
    # sans npm ci, sans node server.js → healthcheck impossible → crash.
    # Le backend est démarré correctement dans les steps ci-dessous.

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Robot Framework + dependencies
        run: |
          pip install \
            robotframework==7.0 \
            robotframework-seleniumlibrary==6.3.0 \
            robotframework-browser==18.0.0 \
            robotframework-requests==0.9.7 \
            robotframework-jsonlibrary==0.5 \
            robotframework-pabot==2.18.0 \
            robotframework-reportportal \
            robotframework-debuglibrary \
            webdriver-manager

      - name: 🌐 Install Playwright (Chrome headless)
        run: |
          rfbrowser init chromium
          echo "Playwright Chromium installé"

      # ✅ FIX : Setup Node.js sur le runner (nécessaire pour npm ci)
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: 🏗️ Start backend pour les tests
        env:
          PORT:               3001
          DASHBOARD_LOGIN:    ${{ secrets.TEST_DASHBOARD_LOGIN }}
          DASHBOARD_PASSWORD: ${{ secrets.TEST_DASHBOARD_PASSWORD }}
          JWT_SECRET:         test-secret-for-ci
          FALLBACK_BALANCE:   10000
          RISK_PERCENT:       1
          MAX_OPEN_TRADES:    5
          DATA_DIR:           /tmp/data
        run: |
          cd backend
          npm ci
          node server.js &
          echo "⏳ Attente démarrage backend..."
          # Retry healthcheck jusqu'à 30s
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3001/health; then
              echo "✅ Backend démarré (tentative $i)"
              exit 0
            fi
            echo "Tentative $i/12 — retry dans 5s..."
            sleep 5
          done
          echo "❌ Backend ne répond pas après 60s"
          exit 1

      - name: 🏗️ Build + Start frontend pour les tests
        run: |
          cd frontend
          npm ci
          npm run build
          npx serve -s dist -l 5173 &
          sleep 5
          curl -sf http://localhost:5173 || echo "⚠️ Frontend health check optionnel"
          echo "✅ Frontend démarré sur http://localhost:5173"

      - name: 🤖 Lancer les tests Robot Framework
        run: |
          mkdir -p reports
          python -m robot \
            --outputdir reports \
            --output   output.xml \
            --log      log.html \
            --report   report.html \
            --xunit    xunit.xml \
            --variable BASE_URL:http://localhost:5173 \
            --variable API_URL:http://localhost:3001 \
            --variable LOGIN:${{ secrets.TEST_DASHBOARD_LOGIN }} \
            --variable PASSWORD:${{ secrets.TEST_DASHBOARD_PASSWORD }} \
            --exclude  skip \
            --loglevel DEBUG \
            tests/robot/
        continue-on-error: true  # Pour toujours uploader le rapport

      - name: 📊 Upload rapport Robot Framework
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-framework-report
          path: |
            reports/report.html
            reports/log.html
            reports/output.xml
            reports/xunit.xml
          retention-days: 30

      - name: 📋 Publier résultats xUnit dans GitHub
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name:          'Robot Framework Results'
          path:          'reports/xunit.xml'
          reporter:      'java-junit'
          fail-on-error: true

      - name: ✅ Vérifier que tous les tests sont passés
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('reports/output.xml')
          root = tree.getroot()
          suite  = root.find('.//suite')
          failed = int(suite.get('failed', 0)) if suite is not None else 0
          passed = int(suite.get('passed', 0)) if suite is not None else 0
          total  = passed + failed
          print(f'Tests: {passed}/{total} passés, {failed} échoués')
          if failed > 0:
              print(f'❌ {failed} test(s) en échec — build annulé')
              exit(1)
          print('✅ Tous les tests passés — build autorisé')
          "

      - name: 📱 Notification Telegram — Tests échoués
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHATID }}" \
            -d "parse_mode=Markdown" \
            -d "text=❌ *CI/CD ÉCHEC — Tests Robot*%0A%0ABranche: \`${{ github.ref_name }}\`%0ACommit: \`${{ github.sha }}\`%0A[Voir le rapport](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"


  # ══════════════════════════════════════════════════════════════
  # JOB 2 — Build + Push Docker (uniquement si tests OK)
  # ══════════════════════════════════════════════════════════════
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: robot-tests
    if: |
      needs.robot-tests.result == 'success' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Générer les tags Docker
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          DATE=$(date +%Y%m%d)

          if [ "$BRANCH" = "main" ]; then
            TAGS_BACKEND="${{ env.IMAGE_BACKEND }}:latest,${{ env.IMAGE_BACKEND }}:${SHA_SHORT},${{ env.IMAGE_BACKEND }}:${DATE}"
            TAGS_FRONTEND="${{ env.IMAGE_FRONTEND }}:latest,${{ env.IMAGE_FRONTEND }}:${SHA_SHORT},${{ env.IMAGE_FRONTEND }}:${DATE}"
          else
            TAGS_BACKEND="${{ env.IMAGE_BACKEND }}:${BRANCH}-${SHA_SHORT}"
            TAGS_FRONTEND="${{ env.IMAGE_FRONTEND }}:${BRANCH}-${SHA_SHORT}"
          fi

          echo "tags_backend=${TAGS_BACKEND}"   >> $GITHUB_OUTPUT
          echo "tags_frontend=${TAGS_FRONTEND}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}"         >> $GITHUB_OUTPUT
          echo "Tags générés: ${TAGS_BACKEND}"

      - name: ⚙️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build + Push image BACKEND
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags_backend }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          labels: |
            org.opencontainers.image.title=ICT Trading Backend
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: 🏗️ Build + Push image FRONTEND
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags_frontend }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          labels: |
            org.opencontainers.image.title=ICT Trading Frontend
            org.opencontainers.image.revision=${{ github.sha }}

      - name: 📱 Notification Telegram — Build réussi
        if: success()
        run: |
          SHA="${{ steps.meta.outputs.sha_short }}"
          BRANCH="${{ github.ref_name }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHATID }}" \
            -d "parse_mode=Markdown" \
            -d "text=✅ *CI/CD SUCCÈS — Images pushées*%0A%0ABranche: \`${BRANCH}\`%0ACommit: \`${SHA}\`%0A%0A🐳 *Images Docker:*%0A\`${{ env.IMAGE_BACKEND }}:${SHA}\`%0A\`${{ env.IMAGE_FRONTEND }}:${SHA}\`%0A%0A[Voir le run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: ❌ Notification Telegram — Build échoué
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHATID }}" \
            -d "parse_mode=Markdown" \
            -d "text=❌ *CI/CD ÉCHEC — Docker Build*%0A%0ABranche: \`${{ github.ref_name }}\`%0A[Voir l'erreur](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"