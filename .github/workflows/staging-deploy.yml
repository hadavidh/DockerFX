name: Deploy Staging

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Staging"]
    types:
      - completed
    branches:
      - develop

concurrency:
  group: staging-deploy-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-staging:
    name: 🚀 Deploy to Staging VPS
    runs-on: ubuntu-latest
    environment: staging
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Compute image tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-backend:develop" >> "$GITHUB_OUTPUT"
            echo "frontend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-frontend:develop" >> "$GITHUB_OUTPUT"
          else
            SHA_SHORT="$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)"
            echo "backend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-backend:develop-$SHA_SHORT" >> "$GITHUB_OUTPUT"
            echo "frontend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-frontend:develop-$SHA_SHORT" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << EOF
            set -e
            cd ~/dockerFX

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            export BACKEND_IMAGE="${{ steps.meta.outputs.backend_image }}"
            export FRONTEND_IMAGE="${{ steps.meta.outputs.frontend_image }}"

            echo "Deploy backend image: \$BACKEND_IMAGE"
            echo "Deploy frontend image: \$FRONTEND_IMAGE"

            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d

            echo "Waiting backend health on port 3002..."
            for i in \$(seq 1 20); do
              if docker compose -f docker-compose.staging.yml exec -T backend wget -qO- http://localhost:3002/health > /dev/null 2>&1; then
                echo "✅ Backend healthy"
                break
              fi
              echo "Backend attempt \$i/20..."
              sleep 5
            done

            echo "Waiting frontend on staging port 8080..."
            for i in \$(seq 1 20); do
              if curl -fsS http://localhost:8080 > /dev/null 2>&1; then
                echo "✅ Frontend reachable on 8080"
                exit 0
              fi
              echo "Frontend attempt \$i/20..."
              sleep 5
            done

            echo "❌ Staging healthcheck failed"
            docker compose -f docker-compose.staging.yml ps
            docker compose -f docker-compose.staging.yml logs --no-color
            exit 1
          EOF

      - name: Show running containers
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd ~/dockerFX && docker compose -f docker-compose.staging.yml ps'

      - name: Show logs on failure
        if: failure()
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd ~/dockerFX && docker compose -f docker-compose.staging.yml logs --no-color'