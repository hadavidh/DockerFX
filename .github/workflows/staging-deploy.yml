name: Deploy Staging

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Staging"]
    types:
      - completed

concurrency:
  group: staging-deploy-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-staging:
    name: 🚀 Deploy Staging Gateway
    runs-on: ubuntu-latest
    environment: staging
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Compute image tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-backend:develop" >> "$GITHUB_OUTPUT"
            echo "frontend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-frontend:develop" >> "$GITHUB_OUTPUT"
          else
            SHA_SHORT="$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)"
            echo "backend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-backend:develop-$SHA_SHORT" >> "$GITHUB_OUTPUT"
            echo "frontend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-frontend:develop-$SHA_SHORT" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy staging on VPS
        run: |
          BACKEND_IMAGE="${{ steps.meta.outputs.backend_image }}"
          FRONTEND_IMAGE="${{ steps.meta.outputs.frontend_image }}"
          DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"
          DOCKERHUB_USER="${{ secrets.DOCKERHUB_USERNAME }}"

          echo "▶  Backend  : ${BACKEND_IMAGE}"
          echo "▶  Frontend : ${FRONTEND_IMAGE}"

          ssh \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            -o ConnectTimeout=10 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << EOFSSH
            set -e
            cd ~/dockerFX

            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USER}" --password-stdin

            export BACKEND_IMAGE="${BACKEND_IMAGE}"
            export FRONTEND_IMAGE="${FRONTEND_IMAGE}"

            echo "Deploying BACKEND_IMAGE=${BACKEND_IMAGE}"
            echo "Deploying FRONTEND_IMAGE=${FRONTEND_IMAGE}"

            docker network inspect trading-staging >/dev/null 2>&1 \
              || docker network create --driver bridge trading-staging

            docker compose -p staging -f docker-compose.staging.yml pull
            docker compose -p staging -f docker-compose.staging.yml down --remove-orphans || true
            docker compose -p staging -f docker-compose.staging.yml up -d

            echo "Waiting for backend to be healthy..."
            BACKEND_HEALTHY=false
            for i in \$(seq 1 20); do
              if docker compose -p staging -f docker-compose.staging.yml exec -T backend \
                wget -qO- http://127.0.0.1:3002/health > /dev/null 2>&1; then
                echo "✅ Backend healthy"
                BACKEND_HEALTHY=true
                break
              fi
              echo "Backend attempt \$i/20..."
              sleep 5
            done

            echo "Waiting for staging origin on 127.0.0.1:8080..."
            ORIGIN_HEALTHY=false
            for i in \$(seq 1 20); do
              if curl -fsS http://127.0.0.1:8080/ > /dev/null 2>&1; then
                echo "✅ Staging origin reachable on 8080"
                ORIGIN_HEALTHY=true
                break
              fi
              echo "Origin attempt \$i/20..."
              sleep 5
            done

            echo "Waiting for staging gateway..."
            GATEWAY_HEALTHY=false
            for i in \$(seq 1 20); do
              if curl -kfsS -H "Host: staging.dockerfx.trade" https://127.0.0.1/ > /dev/null 2>&1; then
                echo "✅ Staging gateway reachable"
                GATEWAY_HEALTHY=true
                break
              fi
              echo "Gateway attempt \$i/20..."
              sleep 5
            done

            if [ "\$GATEWAY_HEALTHY" != "true" ]; then
              echo "❌ Staging gateway healthcheck failed"
              docker compose -p staging -f docker-compose.staging.yml ps || true
              docker compose -p staging -f docker-compose.staging.yml logs --no-color --tail 30 || true
              exit 1
            fi

            echo "✅ Staging déployé avec succès"
          EOFSSH

      - name: Verify public staging URL from runner
        continue-on-error: true
        run: |
          for i in $(seq 1 6); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 --max-time 10 \
              https://staging.dockerfx.trade/ || true)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "304" ]; then
              echo "✅ Staging public URL reachable (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i/6... HTTP=$HTTP_CODE"
            sleep 5
          done
          echo "⚠️  Non accessible depuis le runner (Cloudflare bloque les IPs GitHub Actions — normal)"

      - name: Show running containers
        if: always()
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd ~/dockerFX && docker compose -p staging -f docker-compose.staging.yml ps'

      - name: Show logs on failure
        if: failure()
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd ~/dockerFX && docker compose -p staging -f docker-compose.staging.yml logs --no-color --tail 50'