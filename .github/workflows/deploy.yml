name: CI/CD Pipeline
 
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
 
env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/trading-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/trading-frontend
 
jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: npm ci
        working-directory: backend
      - run: npm run lint --if-present
        working-directory: backend
      - run: npm test
        working-directory: backend
        env: { NODE_ENV: test }
 
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: echo "version=$(date +%Y%m%d)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with: { context: ./backend, push: true, tags: "${{ env.IMAGE_BACKEND }}:${{ steps.version.outputs.version }},${{ env.IMAGE_BACKEND }}:latest", cache-from: type=gha, cache-to: "type=gha,mode=max" }
      - uses: docker/build-push-action@v5
        with: { context: ./frontend, push: true, tags: "${{ env.IMAGE_FRONTEND }}:${{ steps.version.outputs.version }},${{ env.IMAGE_FRONTEND }}:latest", cache-from: type=gha, cache-to: "type=gha,mode=max" }
 
  deploy:
    name: Deploy VPS OVH
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: { name: production, url: "http://${{ secrets.VPS_HOST }}" }
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/dockerFX
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            sleep 5 && curl -f http://localhost/health || exit 1
      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && '✅ Déploiement réussi' || '❌ Déploiement ÉCHOUÉ' }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHATID }}" \
            -d text="${STATUS} — v${{ needs.build.outputs.version }}"