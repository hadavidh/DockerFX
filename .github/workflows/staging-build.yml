name: Build Staging

on:
  push:
    branches:
      - develop

concurrency:
  group: staging-build-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-staging:
    name: 🐳 Build & Push Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout commit
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        run: |
          SHA_SHORT="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "backend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-frontend" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:develop
            ${{ steps.meta.outputs.backend_image }}:develop-${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:develop
            ${{ steps.meta.outputs.frontend_image }}:develop-${{ steps.meta.outputs.sha_short }}
          build-args: |
            VITE_APP_VERSION=develop-${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max