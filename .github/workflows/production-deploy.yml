name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version à déployer (ex: v1.4.7)"
        required: true
        type: string
  workflow_run:
    workflows: ["Build Production"]
    types:
      - completed

concurrency:
  group: production-deploy-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-production:
    name: 🚀 Deploy Production — Rolling Update
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:

      - name: Resolve version (workflow_dispatch)
        id: version_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          V="${{ github.event.inputs.version }}"
          echo "$V" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            || (echo "❌ Version invalide: $V" && exit 1)
          echo "value=$V" >> "$GITHUB_OUTPUT"

      - name: Checkout (workflow_run)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve version (workflow_run)
        id: version_run
        if: github.event_name == 'workflow_run'
        run: |
          V="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)"
          test -n "$V" || (echo "❌ Tag introuvable sur ce commit" && exit 1)
          echo "value=$V" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: 🔄 Rolling Update Production
        run: |
          VERSION="${{ steps.version_dispatch.outputs.value }}${{ steps.version_run.outputs.value }}"
          BACKEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-backend:${VERSION}"
          FRONTEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-frontend:${VERSION}"
          DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"
          DOCKERHUB_USER="${{ secrets.DOCKERHUB_USERNAME }}"

          echo "▶  Version  : ${VERSION}"
          echo "▶  Backend  : ${BACKEND_IMAGE}"
          echo "▶  Frontend : ${FRONTEND_IMAGE}"

          [ -z "${VERSION}"       ] && echo "❌ VERSION vide"       && exit 1
          [ -z "${DOCKERHUB_USER}"] && echo "❌ DOCKERHUB_USERNAME secret manquant" && exit 1
          [ -z "${BACKEND_IMAGE}" ] && echo "❌ BACKEND_IMAGE vide" && exit 1

          ssh \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            -o ConnectTimeout=10 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << EOFSSH
            set -e
            cd ~/dockerFX

            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USER}" --password-stdin

            echo ""
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║  🔄  ROLLING UPDATE — ${VERSION}"
            echo "║  Backend  : ${BACKEND_IMAGE}"
            echo "║  Frontend : ${FRONTEND_IMAGE}"
            echo "║  start-first · parallelism 1 · rollback auto            ║"
            echo "╚══════════════════════════════════════════════════════════╝"
            echo ""

            docker service inspect ict-prod_backend  >/dev/null 2>&1 \
              || (echo "❌ ict-prod_backend introuvable — déployer la stack d'abord" && exit 1)
            docker service inspect ict-prod_frontend >/dev/null 2>&1 \
              || (echo "❌ ict-prod_frontend introuvable — déployer la stack d'abord" && exit 1)

            echo "▶  Pull images..."
            docker pull "${BACKEND_IMAGE}"
            docker pull "${FRONTEND_IMAGE}"

            echo "▶  État AVANT :"
            docker service ps ict-prod_backend --filter desired-state=running \
              --format "table {{.Name}}\t{{.Image}}\t{{.CurrentState}}" | head -5

            echo ""
            echo "🔄 Rolling update BACKEND..."
            docker service update \
              --image "${BACKEND_IMAGE}" \
              --update-parallelism 1 \
              --update-delay 10s \
              --update-order start-first \
              --update-failure-action rollback \
              --update-monitor 30s \
              --with-registry-auth \
              ict-prod_backend

            echo ""
            echo "🔄 Rolling update FRONTEND..."
            docker service update \
              --image "${FRONTEND_IMAGE}" \
              --update-parallelism 1 \
              --update-delay 10s \
              --update-order start-first \
              --update-failure-action rollback \
              --update-monitor 30s \
              --with-registry-auth \
              ict-prod_frontend

            echo ""
            echo "▶  Attente convergence (max 3 min)..."
            for i in \$(seq 1 36); do
              BR=\$(docker service ls --filter name=ict-prod_backend  --format "{{.Replicas}}")
              FR=\$(docker service ls --filter name=ict-prod_frontend --format "{{.Replicas}}")
              [ "\$BR" = "2/2" ] && [ "\$FR" = "2/2" ] && echo "✅ Convergence 2/2" && break
              echo "   [\${i}/36] backend: \$BR · frontend: \$FR"
              sleep 5
            done

            SB=\$(docker service inspect ict-prod_backend  --format '{{.UpdateStatus.State}}' 2>/dev/null || echo "")
            SF=\$(docker service inspect ict-prod_frontend --format '{{.UpdateStatus.State}}' 2>/dev/null || echo "")
            if [ "\$SB" = "rollback_completed" ] || [ "\$SF" = "rollback_completed" ]; then
              echo "❌ ROLLBACK AUTO déclenché — la nouvelle version a échoué"
              docker service logs ict-prod_backend --since 5m --tail 50 || true
              exit 1
            fi

            BR=\$(docker service ls --filter name=ict-prod_backend  --format "{{.Replicas}}")
            FR=\$(docker service ls --filter name=ict-prod_frontend --format "{{.Replicas}}")
            [ "\$BR" != "2/2" ] && echo "❌ backend non convergé: \$BR"  && exit 1
            [ "\$FR" != "2/2" ] && echo "❌ frontend non convergé: \$FR" && exit 1
            echo "✅ 2/2 backend · 2/2 frontend"

            echo ""
            echo "▶  État APRÈS :"
            docker service ls

            echo ""
            echo "▶  Healthcheck gateway..."
            for i in \$(seq 1 20); do
              curl -kfsS -H "Host: dockerfx.trade" https://127.0.0.1/ > /dev/null 2>&1 \
                && echo "✅ Gateway healthy — déploiement OK" && exit 0
              echo "   Tentative \$i/20..."
              sleep 5
            done
            echo "❌ Gateway unhealthy"
            exit 1
          EOFSSH

      - name: 🌐 Verify public URL
        continue-on-error: true
        run: |
          for i in $(seq 1 6); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 \
              https://dockerfx.trade/ || true)
            [ "$HTTP" = "200" ] || [ "$HTTP" = "304" ] \
              && echo "✅ https://dockerfx.trade accessible (HTTP $HTTP)" && exit 0
            echo "   Tentative $i/6... HTTP=$HTTP"
            sleep 5
          done
          echo "⚠️  Non accessible depuis le runner (Cloudflare bloque les IPs GitHub Actions — normal)"

      - name: 📊 Final status
        if: always()
        run: |
          ssh \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes -o ConnectTimeout=10 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'docker service ls && \
             echo "--- backend ---"  && docker service ps ict-prod_backend  --no-trunc | head -8 && \
             echo "--- frontend ---" && docker service ps ict-prod_frontend --no-trunc | head -8'

      - name: 🎉 Deployment Summary
        if: success()
        run: |
          VERSION="${{ steps.version_dispatch.outputs.value }}${{ steps.version_run.outputs.value }}"
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  ✅  ROLLING UPDATE TERMINÉ                          ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  Version  : ${VERSION}"
          echo "║  URL      : https://dockerfx.trade"
          echo "║  Downtime : 0 seconde"
          echo "║  Replicas : backend 2/2 · frontend 2/2"
          echo "╚══════════════════════════════════════════════════════╝"
