name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version à déployer (ex: v1.4.7)"
        required: true
        type: string
  workflow_run:
    workflows: ["Build Production"]
    types:
      - completed

concurrency:
  group: production-deploy-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-production:
    name: 🚀 Deploy Production — Rolling Update Zéro Downtime
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:

      # ── Résolution version — workflow_dispatch ────────────────────────
      - name: Resolve version (manual trigger)
        id: version_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            || (echo "❌ Version invalide: $VERSION" && exit 1)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Résolution version — workflow_run ─────────────────────────────
      - name: Checkout for tag resolution (auto trigger)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve version (auto trigger)
        id: version_run
        if: github.event_name == 'workflow_run'
        run: |
          VERSION="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)"
          test -n "$VERSION" \
            || (echo "❌ Impossible de déterminer le tag sur ce commit" && exit 1)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Fusion + validation finale ────────────────────────────────────
      - name: Validate final version
        id: version
        run: |
          V="${{ steps.version_dispatch.outputs.value }}${{ steps.version_run.outputs.value }}"
          echo "$V" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            || (echo "❌ Version finale invalide: '$V'" && exit 1)
          echo "value=$V" >> "$GITHUB_OUTPUT"
          echo "✅ Version validée : $V"

      # ── SSH ───────────────────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # ── Rolling Update ────────────────────────────────────────────────
      # POURQUOI env: block + << 'EOFSSH' ?
      # ${{ }} est résolu par GitHub Actions AVANT le shell
      # $VAR dans un heredoc non-quoté est évalué par le runner local (vide!)
      # Solution : env: block rend les valeurs disponibles localement
      # puis on les passe au VPS via "VAR='value' bash -s"
      # Le heredoc QUOTÉ << 'EOFSSH' empêche toute évaluation locale
      - name: 🔄 Rolling Update Production
        env:
          DEPLOY_VERSION: "${{ steps.version.outputs.value }}"
          BACKEND_IMAGE:  "${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-backend:${{ steps.version.outputs.value }}"
          FRONTEND_IMAGE: "${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-frontend:${{ steps.version.outputs.value }}"
          DOCKERHUB_TOKEN: "${{ secrets.DOCKERHUB_TOKEN }}"
          DOCKERHUB_USER:  "${{ secrets.DOCKERHUB_USERNAME }}"
        run: |
          echo "▶  Debug local runner :"
          echo "   Version    : $DEPLOY_VERSION"
          echo "   Backend    : $BACKEND_IMAGE"
          echo "   Frontend   : $FRONTEND_IMAGE"

          [ -z "$DEPLOY_VERSION"  ] && echo "❌ DEPLOY_VERSION vide"                                       && exit 1
          [ -z "$DOCKERHUB_USER"  ] && echo "❌ DOCKERHUB_USER vide — vérifier secret DOCKERHUB_USERNAME"  && exit 1
          [ -z "$BACKEND_IMAGE"   ] && echo "❌ BACKEND_IMAGE vide"                                        && exit 1

          ssh \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            -o ConnectTimeout=10 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "BACKEND_IMAGE='$BACKEND_IMAGE' FRONTEND_IMAGE='$FRONTEND_IMAGE' DEPLOY_VERSION='$DEPLOY_VERSION' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' DOCKERHUB_USER='$DOCKERHUB_USER' bash -s" << 'EOFSSH'
            set -e
            cd ~/dockerFX

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin

            VERSION="$DEPLOY_VERSION"

            [ -z "$VERSION"       ] && echo "❌ VERSION vide sur VPS"       && exit 1
            [ -z "$BACKEND_IMAGE" ] && echo "❌ BACKEND_IMAGE vide sur VPS" && exit 1

            echo ""
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║  🔄  ROLLING UPDATE PRODUCTION                          ║"
            echo "╠══════════════════════════════════════════════════════════╣"
            echo "║  Version    : $VERSION"
            echo "║  Backend    : $BACKEND_IMAGE"
            echo "║  Frontend   : $FRONTEND_IMAGE"
            echo "║  Stratégie  : start-first · 1 replica/step · rollback   ║"
            echo "╚══════════════════════════════════════════════════════════╝"
            echo ""

            docker service inspect ict-prod_backend  >/dev/null 2>&1 \
              || (echo "❌ ict-prod_backend introuvable. Déployer d'abord la stack." && exit 1)
            docker service inspect ict-prod_frontend >/dev/null 2>&1 \
              || (echo "❌ ict-prod_frontend introuvable. Déployer d'abord la stack." && exit 1)

            echo "▶  Pull images..."
            docker pull "$BACKEND_IMAGE"
            docker pull "$FRONTEND_IMAGE"

            echo ""
            echo "▶  État AVANT :"
            docker service ps ict-prod_backend --filter desired-state=running \
              --format "table {{.Name}}\t{{.Image}}\t{{.CurrentState}}" | head -5

            echo ""
            echo "🔄 Rolling update BACKEND..."
            docker service update \
              --image "$BACKEND_IMAGE" \
              --update-parallelism 1 \
              --update-delay 10s \
              --update-order start-first \
              --update-failure-action rollback \
              --update-monitor 30s \
              --update-max-failure-ratio 0.0 \
              --with-registry-auth \
              ict-prod_backend

            echo ""
            echo "🔄 Rolling update FRONTEND..."
            docker service update \
              --image "$FRONTEND_IMAGE" \
              --update-parallelism 1 \
              --update-delay 10s \
              --update-order start-first \
              --update-failure-action rollback \
              --update-monitor 30s \
              --update-max-failure-ratio 0.0 \
              --with-registry-auth \
              ict-prod_frontend

            echo ""
            echo "▶  Attente convergence (max 3 min)..."
            for i in $(seq 1 36); do
              BR=$(docker service ls --filter name=ict-prod_backend  --format "{{.Replicas}}")
              FR=$(docker service ls --filter name=ict-prod_frontend --format "{{.Replicas}}")
              if [ "$BR" = "2/2" ] && [ "$FR" = "2/2" ]; then
                echo "✅ Convergence : backend $BR · frontend $FR"
                break
              fi
              echo "   [${i}/36] backend: $BR · frontend: $FR"
              sleep 5
            done

            SB=$(docker service inspect ict-prod_backend  --format '{{.UpdateStatus.State}}' 2>/dev/null || echo "")
            SF=$(docker service inspect ict-prod_frontend --format '{{.UpdateStatus.State}}' 2>/dev/null || echo "")
            echo "▶  UpdateStatus — backend: ${SB:-none} · frontend: ${SF:-none}"

            if [ "$SB" = "rollback_completed" ] || [ "$SF" = "rollback_completed" ]; then
              echo "❌ ROLLBACK AUTO déclenché"
              docker service logs ict-prod_backend --since 5m --tail 50 || true
              exit 1
            fi

            BR=$(docker service ls --filter name=ict-prod_backend  --format "{{.Replicas}}")
            FR=$(docker service ls --filter name=ict-prod_frontend --format "{{.Replicas}}")
            [ "$BR" != "2/2" ] && echo "❌ backend non convergé: $BR"  && exit 1
            [ "$FR" != "2/2" ] && echo "❌ frontend non convergé: $FR" && exit 1
            echo "✅ 2/2 backend et 2/2 frontend"

            echo ""
            echo "▶  État APRÈS :"
            docker service ls
            docker service ps ict-prod_backend --filter desired-state=running \
              --format "table {{.Name}}\t{{.Image}}\t{{.CurrentState}}" | head -5

            echo ""
            echo "▶  Healthcheck gateway..."
            for i in $(seq 1 20); do
              if curl -kfsS -H "Host: dockerfx.trade" https://127.0.0.1/ > /dev/null 2>&1; then
                echo "✅ Gateway healthy"
                exit 0
              fi
              echo "   Tentative $i/20..."
              sleep 5
            done
            echo "❌ Gateway unhealthy"
            docker service logs ict-prod_frontend --since 5m --tail 30 || true
            exit 1
          EOFSSH

      - name: 🌐 Verify public URL
        run: |
          echo "Vérification https://dockerfx.trade..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 --max-time 10 \
              https://dockerfx.trade/ || true)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "304" ]; then
              echo "✅ Production OK (HTTP $HTTP_CODE) — ${{ steps.version.outputs.value }}"
              exit 0
            fi
            echo "   Tentative $i/12... HTTP=$HTTP_CODE"
            sleep 5
          done
          echo "❌ Production non accessible"
          exit 1

      - name: 📊 Final service status
        if: always()
        run: |
          ssh \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes -o ConnectTimeout=10 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'docker service ls && \
             echo "--- backend ---"  && docker service ps ict-prod_backend  --no-trunc | head -10 && \
             echo "--- frontend ---" && docker service ps ict-prod_frontend --no-trunc | head -10 && \
             docker service inspect ict-prod_backend  --format "backend  : {{.UpdateStatus.State}}" && \
             docker service inspect ict-prod_frontend --format "frontend : {{.UpdateStatus.State}}"'

      - name: 🎉 Deployment Summary
        if: success()
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  ✅  ROLLING UPDATE TERMINÉ                          ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  Version  : ${{ steps.version.outputs.value }}"
          echo "║  URL      : https://dockerfx.trade"
          echo "║  Downtime : 0 seconde"
          echo "╚══════════════════════════════════════════════════════╝"