name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version à déployer (ex: v1.2.0)"
        required: true
        type: string
  workflow_run:
    workflows: ["Build Production"]
    types:
      - completed

concurrency:
  group: production-deploy-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-production:
    name: 🚀 Deploy to Production VPS
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout exact built commit
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Compute production image tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(git tag --points-at HEAD | grep '^v[0-9]' | head -n1)"
          fi

          test -n "$VERSION" || (echo "Impossible de déterminer la version à déployer" && exit 1)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "backend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-backend:$VERSION" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-frontend:$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << EOF
            set -e
            cd ~/dockerFX

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            export BACKEND_IMAGE="${{ steps.meta.outputs.backend_image }}"
            export FRONTEND_IMAGE="${{ steps.meta.outputs.frontend_image }}"

            echo "Deploy backend image: \$BACKEND_IMAGE"
            echo "Deploy frontend image: \$FRONTEND_IMAGE"

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            echo "Waiting backend health on port 3002..."
            for i in \$(seq 1 20); do
              if docker compose -f docker-compose.prod.yml exec -T backend wget -qO- http://localhost:3002/health > /dev/null 2>&1; then
                echo "✅ Backend healthy"
                break
              fi
              echo "Backend attempt \$i/20..."
              sleep 5
            done

            echo "Waiting frontend on production port 80..."
            for i in \$(seq 1 20); do
              if curl -fsS http://localhost > /dev/null 2>&1; then
                echo "✅ Frontend reachable on port 80"
                exit 0
              fi
              echo "Frontend attempt \$i/20..."
              sleep 5
            done

            echo "❌ Production healthcheck failed"
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --no-color
            exit 1
          EOF

      - name: Show running containers
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd ~/dockerFX && docker compose -f docker-compose.prod.yml ps'

      - name: Show logs on failure
        if: failure()
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd ~/dockerFX && docker compose -f docker-compose.prod.yml logs --no-color'