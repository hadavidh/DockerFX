# ════════════════════════════════════════════════════════════════
# .github/workflows/ci-cd.yml
# Pipeline CI/CD — ICT Trading Dashboard
#
# PIPELINE A (toutes branches) :
#   lint → tests Robot Framework → scan Trivy
#
# PIPELINE B (develop uniquement) :
#   build image :develop → push DockerHub → deploy staging
#
# PIPELINE C (main uniquement) :
#   build image :latest → push DockerHub → deploy prod Swarm
#   → créer GitHub Release + CHANGELOG automatique
# ════════════════════════════════════════════════════════════════

name: CI/CD — ICT Trading Dashboard

on:
  push:
    branches:
      - 'feature/**'
      - 'develop'
      - 'main'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

env:
  IMAGE_BACKEND:  ${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-frontend

# ══════════════════════════════════════════════════════════════
# JOB 1 — LINT (rapide, ~1 min)
# ══════════════════════════════════════════════════════════════
jobs:

  lint:
    name: 🔍 Lint ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Lint backend
        run: |
          cd backend
          npm ci --silent
          npx eslint . --ext .js --max-warnings 0 || true

      - name: Lint frontend
        run: |
          cd frontend
          npm ci --silent
          npm run lint || true

# ══════════════════════════════════════════════════════════════
# JOB 2 — TESTS ROBOT FRAMEWORK (~8 min)
# ══════════════════════════════════════════════════════════════

  robot-tests:
    name: 🤖 Robot Framework Tests (Selenium + API)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint
    permissions:
      checks:        write
      contents:      read
      pull-requests: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── Chrome + ChromeDriver ─────────────────────────────────
      - name: 🌐 Installer Google Chrome + Xvfb
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | \
            sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable xvfb
          google-chrome --version

      - name: 🔧 Installer ChromeDriver
        run: |
          pip install webdriver-manager
          DRIVER_PATH=$(python -c "from webdriver_manager.chrome import ChromeDriverManager; print(ChromeDriverManager().install())")
          sudo cp "$DRIVER_PATH" /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      # ── Python + Robot Framework ──────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Installer Robot Framework + SeleniumLibrary + RequestsLibrary
        run: |
          pip install \
            robotframework==7.0 \
            robotframework-seleniumlibrary==6.3.0 \
            robotframework-requests==0.9.7 \
            robotframework-jsonlibrary==0.5.0 \
            robotframework-pabot==2.18.0 \
            webdriver-manager

      # ── Node.js + App ─────────────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: 🚀 Démarrer le backend (mode test)
        env:
          PORT:               3001
          DASHBOARD_LOGIN:    ${{ secrets.TEST_DASHBOARD_LOGIN }}
          DASHBOARD_PASSWORD: ${{ secrets.TEST_DASHBOARD_PASSWORD }}
          JWT_SECRET:         test-secret-ci-only
          FALLBACK_BALANCE:   10000
          RISK_PERCENT:       1
          MAX_OPEN_TRADES:    5
          DATA_DIR:           /tmp/data
          NODE_ENV:           test
        run: |
          cd backend && npm ci --silent
          node server.js &
          echo "⏳ Attente démarrage backend..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3001/health > /dev/null; then
              echo "✅ Backend OK (tentative $i)"
              break
            fi
            echo "Tentative $i/12..."
            sleep 5
          done
          curl -sf http://localhost:3001/health || exit 1

      # ── Frontend avec proxy API ───────────────────────────────
      # IMPORTANT : serve seul ne proxifie pas /api/ vers le backend.
      # On utilise un mini-serveur Express avec http-proxy-middleware
      # pour que les appels /api/auth/login du navigateur arrivent
      # bien sur backend:3001 et non sur un 404.
      - name: 🏗️ Build + démarrer frontend avec proxy API
        run: |
          # Build du frontend React
          cd frontend && npm ci --silent && npm run build
          FRONTEND_DIST="$(pwd)/dist"
          cd ..

          # Créer un dossier proxy ISOLÉ avec ses propres node_modules
          # → évite le conflit avec path-to-regexp v8 de Vite/React
          mkdir -p /tmp/proxy-server
          cd /tmp/proxy-server
          npm init -y --silent

          # Installer express@4 + proxy dans l'environnement isolé
          npm install --silent express@4 http-proxy-middleware

          # Écrire le serveur proxy
          cat > /tmp/proxy-server/server.js << JSEOF
const express = require('/tmp/proxy-server/node_modules/express');
const { createProxyMiddleware } = require('/tmp/proxy-server/node_modules/http-proxy-middleware');
const path = require('path');

const app  = express();
const DIST = process.env.DIST_PATH;

// Proxy /api, /webhook, /ws → backend:3001
app.use('/api',     createProxyMiddleware({ target: 'http://localhost:3001', changeOrigin: true, logLevel: 'silent' }));
app.use('/webhook', createProxyMiddleware({ target: 'http://localhost:3001', changeOrigin: true, logLevel: 'silent' }));
app.use('/ws',      createProxyMiddleware({ target: 'http://localhost:3001', changeOrigin: true, ws: true, logLevel: 'silent' }));

// Fichiers React statiques + SPA fallback
app.use(express.static(DIST));
app.get('/', function(req, res) { res.sendFile(path.join(DIST, 'index.html')); });
app.get('/login', function(req, res) { res.sendFile(path.join(DIST, 'index.html')); });
app.use(function(req, res) { res.sendFile(path.join(DIST, 'index.html')); });

app.listen(5173, function() {
  console.log('✅ Frontend proxy sur http://localhost:5173');
  console.log('   DIST =', DIST);
});
JSEOF

          # Lancer le serveur proxy
          DIST_PATH="$FRONTEND_DIST" node /tmp/proxy-server/server.js &

          # Attendre que le serveur soit prêt (max 30s)
          echo "⏳ Attente démarrage frontend..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "✅ Frontend OK (tentative $i)"
              break
            fi
            echo "Tentative $i/15..."
            sleep 2
          done

          # Vérification finale
          curl -sf http://localhost:5173 || { echo "❌ Frontend ne répond pas sur :5173"; exit 1; }
          curl -sf http://localhost:5173/health && echo "✅ Proxy /health OK" || echo "⚠️ /health non dispo"

      # ── Variables RF via fichier Python ───────────────────────
      # Évite l'interpolation shell des caractères spéciaux ($, !)
      - name: 📝 Préparer les variables Robot Framework
        env:
          RF_USERNAME: ${{ secrets.TEST_DASHBOARD_LOGIN }}
          RF_PASSWORD: ${{ secrets.TEST_DASHBOARD_PASSWORD }}
        run: |
          python3 -c "
          import os
          with open('/tmp/rf_vars.py', 'w') as f:
              f.write('USERNAME_VALUE = ' + repr(os.environ['RF_USERNAME']) + '\n')
              f.write('PASSWORD_VALUE = ' + repr(os.environ['RF_PASSWORD']) + '\n')
          print('✅ Variables RF écrites dans /tmp/rf_vars.py')
          print('USERNAME_VALUE =', repr(os.environ['RF_USERNAME']))
          print('PASSWORD_VALUE length =', len(os.environ['RF_PASSWORD']))
          "
          mkdir -p reports/api reports/dashboard reports/screenshots

      # ── Tests API (RequestsLibrary — sans navigateur) ─────────
      - name: 🔌 Lancer les tests API
        run: |
          python -m robot \
            --outputdir  reports/api \
            --output     output.xml \
            --log        log.html \
            --report     report.html \
            --xunit      xunit.xml \
            --variablefile /tmp/rf_vars.py \
            --variable   API_URL:http://localhost:3001 \
            --loglevel   INFO \
            tests/robot/suites/api_tests.robot
        continue-on-error: true

      # ── Tests Dashboard (SeleniumLibrary — Chrome headless) ───
      - name: 🤖 Lancer les tests Dashboard (Selenium)
        env:
          DISPLAY: :99
        run: |
          # Xvfb sans les warnings xkbcomp
          Xvfb :99 -screen 0 1920x1080x24 2>/dev/null &
          sleep 2
          python -m robot \
            --outputdir  reports/dashboard \
            --output     output.xml \
            --log        log.html \
            --report     report.html \
            --xunit      xunit.xml \
            --variablefile /tmp/rf_vars.py \
            --variable   URL:http://localhost:5173 \
            --variable   BROWSER:headlesschrome \
            --variable   TIMEOUT:15s \
            --loglevel   INFO \
            tests/robot/suites/dashboard_tests.robot
        continue-on-error: true

      # ── Fusionner les rapports ─────────────────────────────────
      - name: 📊 Fusionner les rapports Robot Framework
        run: |
          python -m robot.rebot \
            --outputdir reports \
            --output    output.xml \
            --log       log.html \
            --report    report.html \
            --xunit     xunit.xml \
            --name      "ICT Trading — Tests complets" \
            reports/api/output.xml \
            reports/dashboard/output.xml
        continue-on-error: true

      - name: 📊 Upload rapport complet
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-report-${{ github.run_number }}
          path: |
            reports/report.html
            reports/log.html
            reports/output.xml
            reports/xunit.xml
            reports/screenshots/
          retention-days: 30

      - name: 📋 Publier résultats dans GitHub
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name:          'Robot Framework — ${{ github.ref_name }}'
          path:          'reports/xunit.xml'
          reporter:      'java-junit'
          fail-on-error: false

      # ── Vérification finale — BLOQUE si échecs ────────────────
      # Lit les 2 fichiers séparément — un fichier manquant
      # ne masque pas les échecs de l'autre
      - name: ✅ Vérifier résultats (bloque si échecs)
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET, sys, os

          failed_total = 0
          passed_total = 0

          for f in ['reports/api/output.xml', 'reports/dashboard/output.xml']:
              if not os.path.exists(f):
                  print(f'⚠️  {f} introuvable — ignoré')
                  continue
              tree  = ET.parse(f)
              suite = tree.getroot().find('.//suite')
              failed = int(suite.get('failed', 0)) if suite else 0
              passed = int(suite.get('passed', 0)) if suite else 0
              label  = os.path.basename(os.path.dirname(f))
              print(f'{label}: {passed} passés | {failed} échoués')
              failed_total += failed
              passed_total += passed

          print('')
          print(f'Total : {passed_total} passés | {failed_total} échoués')
          if failed_total > 0:
              print('❌ Build bloqué — corriger les tests avant de merger')
              sys.exit(1)
          print('✅ Tous les tests passés — build autorisé')
          "

      - name: 📱 Telegram — Tests KO
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHATID }}" \
            -d "parse_mode=Markdown" \
            -d "text=❌ *Tests Robot échoués*%0ABranche : \`${{ github.ref_name }}\`%0ACommit : \`${{ github.sha }}\`%0A[Voir rapport](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

# ══════════════════════════════════════════════════════════════
# JOB 3 — SCAN SÉCURITÉ TRIVY (bonus §8.2)
# ══════════════════════════════════════════════════════════════

  trivy-scan:
    name: 🔒 Trivy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build image temporaire pour scan
        run: |
          docker build -t scan-backend:tmp ./backend/ --target production 2>/dev/null || \
          docker build -t scan-backend:tmp ./backend/

      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    'scan-backend:tmp'
          format:       'table'
          severity:     'CRITICAL,HIGH'
          exit-code:    '0'

      - name: Supprimer image temporaire
        run: docker rmi scan-backend:tmp || true

# ══════════════════════════════════════════════════════════════
# JOB 4 — BUILD + PUSH DOCKER STAGING (develop uniquement)
# Déclenché SEULEMENT si robot-tests == success
# ══════════════════════════════════════════════════════════════

  build-staging:
    name: 🐳 Build Staging (develop)
    runs-on: ubuntu-latest
    needs: [robot-tests, trivy-scan]
    if: |
      needs.robot-tests.result == 'success' &&
      github.ref == 'refs/heads/develop'

    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Tags staging
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=$SHA"                                                                          >> $GITHUB_OUTPUT
          echo "tags_backend=${{ env.IMAGE_BACKEND }}:develop,${{ env.IMAGE_BACKEND }}:develop-$SHA"    >> $GITHUB_OUTPUT
          echo "tags_frontend=${{ env.IMAGE_FRONTEND }}:develop,${{ env.IMAGE_FRONTEND }}:develop-$SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build + Push backend:develop
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags_backend }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: 🏗️ Build + Push frontend:develop
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags_frontend }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: 📱 Telegram — Staging buildé
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHATID }}" \
            -d "parse_mode=Markdown" \
            -d "text=🔵 *Staging buildé*%0AImages : \`develop-${{ steps.meta.outputs.sha_short }}\`%0ATest sur : http://${{ secrets.VPS_HOST }}:8080"

# ══════════════════════════════════════════════════════════════
# JOB 5 — DEPLOY STAGING via SSH
# ══════════════════════════════════════════════════════════════

  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: build-staging
    if: needs.build-staging.result == 'success'

    steps:
      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy staging sur VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd ~/dockerFX
            docker compose -p staging -f docker-compose.staging.yml pull
            docker compose -p staging -f docker-compose.staging.yml up -d
            echo "✅ Staging déployé"
            docker ps | grep staging
          ENDSSH

      - name: ✅ Vérifier staging
        run: |
          sleep 15
          curl -sf http://${{ secrets.VPS_HOST }}:8080/health || \
            echo "⚠️ Health check staging non disponible"

      - name: 📱 Telegram — Staging déployé
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHATID }}" \
            -d "parse_mode=Markdown" \
            -d "text=🔵 *Staging déployé*%0AURL : http://${{ secrets.VPS_HOST }}:8080%0ABranche : \`develop\`"

# ══════════════════════════════════════════════════════════════
# JOB 6 — BUILD + PUSH DOCKER PRODUCTION (main uniquement)
# Déclenché SEULEMENT si robot-tests == success
# ══════════════════════════════════════════════════════════════

  build-production:
    name: 🐳 Build Production (main)
    runs-on: ubuntu-latest
    needs: [robot-tests, trivy-scan]
    if: |
      needs.robot-tests.result == 'success' &&
      github.ref == 'refs/heads/main'

    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      version:   ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Calculer la prochaine version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Dernier tag : $LAST_TAG"
          VERSION=${LAST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s" -10)
          if echo "$COMMITS" | grep -qE "^feat!:|^BREAKING CHANGE"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            BUMP="majeure"
          elif echo "$COMMITS" | grep -qE "^feat:"; then
            MINOR=$((MINOR + 1)); PATCH=0
            BUMP="mineure"
          else
            PATCH=$((PATCH + 1))
            BUMP="patch"
          fi
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Nouvelle version : $NEW_VERSION (bump $BUMP)"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: 🏷️ Tags production
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="${{ steps.version.outputs.version }}"
          echo "sha_short=$SHA" >> $GITHUB_OUTPUT
          echo "tags_backend=${{ env.IMAGE_BACKEND }}:latest,${{ env.IMAGE_BACKEND }}:${VERSION},${{ env.IMAGE_BACKEND }}:${SHA}"    >> $GITHUB_OUTPUT
          echo "tags_frontend=${{ env.IMAGE_FRONTEND }}:latest,${{ env.IMAGE_FRONTEND }}:${VERSION},${{ env.IMAGE_FRONTEND }}:${SHA}" >> $GITHUB_OUTPUT

      - name: 🔑 Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build + Push backend:latest
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags_backend }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: 🏗️ Build + Push frontend:latest
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags_frontend }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

# ══════════════════════════════════════════════════════════════
# JOB 7 — DEPLOY PRODUCTION via SSH + Swarm rolling update
# ══════════════════════════════════════════════════════════════

  deploy-production:
    name: 🚀 Deploy Production (Swarm)
    runs-on: ubuntu-latest
    needs: build-production
    if: needs.build-production.result == 'success'
    environment:
      name: production
      url: http://135.125.196.204

    steps:
      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Rolling update Swarm (zéro downtime)
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            echo "🔄 Rolling update backend..."
            docker service update \
              --image dave67000/ict-trading-backend:latest \
              --update-parallelism 1 \
              --update-delay 10s \
              ict-prod_backend

            echo "🔄 Rolling update frontend..."
            docker service update \
              --image dave67000/ict-trading-frontend:latest \
              --update-parallelism 1 \
              --update-delay 10s \
              ict-prod_frontend

            echo "✅ Production mise à jour"
            docker service ls
          ENDSSH

      - name: ✅ Vérifier production
        run: |
          sleep 20
          curl -sf http://${{ secrets.VPS_HOST }}/health && echo "✅ Production OK" || \
          echo "⚠️ Health check en cours..."

      - name: 📱 Telegram — Production déployée
        if: success()
        run: |
          VERSION="${{ needs.build-production.outputs.version }}"
          SHA="${{ needs.build-production.outputs.sha_short }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHATID }}" \
            -d "parse_mode=Markdown" \
            -d "text=🟢 *Production déployée ${VERSION}*%0AURL : http://${{ secrets.VPS_HOST }}%0ACommit : \`${SHA}\`%0A[Voir release](${{ github.server_url }}/${{ github.repository }}/releases/tag/${VERSION})"

# ══════════════════════════════════════════════════════════════
# JOB 8 — GITHUB RELEASE + CHANGELOG (main uniquement)
# ══════════════════════════════════════════════════════════════

  create-release:
    name: 📦 GitHub Release + CHANGELOG
    runs-on: ubuntu-latest
    needs: [build-production, deploy-production]
    if: |
      needs.build-production.result == 'success' &&
      needs.deploy-production.result == 'success'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Générer le CHANGELOG
        id: changelog
        run: |
          VERSION="${{ needs.build-production.outputs.version }}"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          DATE=$(date '+%Y-%m-%d')
          CHANGELOG="## ${VERSION} — ${DATE}\n\n"
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%an)" 2>/dev/null)
          else
            COMMITS=$(git log --pretty=format:"- %s (%an)" -20)
          fi
          FEATURES=$(echo "$COMMITS" | grep "^- feat:"  | sed 's/^- feat: /- ✨ /' || true)
          FIXES=$(echo "$COMMITS"    | grep "^- fix:"   | sed 's/^- fix: /- 🐛 /'  || true)
          CI=$(echo "$COMMITS"       | grep "^- ci:"    | sed 's/^- ci: /- ⚙️ /'   || true)
          DOCS=$(echo "$COMMITS"     | grep "^- docs:"  | sed 's/^- docs: /- 📚 /' || true)
          OTHERS=$(echo "$COMMITS"   | grep -vE "^- (feat|fix|ci|docs|test|chore):" || true)
          [ -n "$FEATURES" ] && CHANGELOG="${CHANGELOG}### ✨ Nouvelles fonctionnalités\n${FEATURES}\n\n"
          [ -n "$FIXES"    ] && CHANGELOG="${CHANGELOG}### 🐛 Corrections\n${FIXES}\n\n"
          [ -n "$CI"       ] && CHANGELOG="${CHANGELOG}### ⚙️ CI/CD\n${CI}\n\n"
          [ -n "$DOCS"     ] && CHANGELOG="${CHANGELOG}### 📚 Documentation\n${DOCS}\n\n"
          [ -n "$OTHERS"   ] && CHANGELOG="${CHANGELOG}### 🔧 Autres\n${OTHERS}\n\n"
          SHA="${{ needs.build-production.outputs.sha_short }}"
          CHANGELOG="${CHANGELOG}### 🐳 Images Docker\n"
          CHANGELOG="${CHANGELOG}- \`dave67000/ict-trading-backend:${VERSION}\`\n"
          CHANGELOG="${CHANGELOG}- \`dave67000/ict-trading-frontend:${VERSION}\`\n"
          printf "$CHANGELOG" > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: 🏷️ Créer le tag Git
        run: |
          VERSION="${{ needs.build-production.outputs.version }}"
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: 📦 Créer la GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name:   ${{ needs.build-production.outputs.version }}
          name:       "Release ${{ needs.build-production.outputs.version }}"
          body_path:  /tmp/release_notes.md
          draft:      false
          prerelease: false

      - name: 📝 Mettre à jour CHANGELOG.md dans le repo
        run: |
          VERSION="${{ needs.build-production.outputs.version }}"
          if [ -f "CHANGELOG.md" ]; then
            cat /tmp/release_notes.md CHANGELOG.md > /tmp/new_changelog.md
          else
            echo "# Changelog — ICT Trading Dashboard" > /tmp/new_changelog.md
            echo "" >> /tmp/new_changelog.md
            cat /tmp/release_notes.md >> /tmp/new_changelog.md
          fi
          cp /tmp/new_changelog.md CHANGELOG.md
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for ${VERSION} [skip ci]"
          git push origin main
