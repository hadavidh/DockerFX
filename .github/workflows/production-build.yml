name: Build Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Tag Git à builder (ex: v1.4.7)"
        required: true
        type: string

concurrency:
  group: production-build-${{ github.ref || github.event.inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-production:
    name: 🐳 Build & Push Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.version) || github.ref }}

      - name: Extract version from tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' || (echo "Tag invalide: $VERSION" && exit 1)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "backend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ secrets.DOCKERHUB_USERNAME }}/ict-trading-frontend" >> "$GITHUB_OUTPUT"

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend production image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.backend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend production image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.frontend_image }}:latest
          build-args: |
            VITE_APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
