# ════════════════════════════════════════════════════════════
# PR Check — Validation rapide sur chaque Pull Request
# ════════════════════════════════════════════════════════════
name: PR Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint --if-present

      - name: Tests
        working-directory: backend
        run: npm test -- --coverage

      - name: Docker build check (sans push)
        run: |
          docker build -t trading-backend-test  ./backend
          docker build -t trading-frontend-test ./frontend
          echo "✅ Les deux images buildent correctement"