services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: 3003
      NODE_ENV: test
      JWT_SECRET: test-secret-ci-only
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHATID: ${TELEGRAM_CHATID:-}
      CTRADER_CLIENT_ID: ${CTRADER_CLIENT_ID:-}
      CTRADER_CLIENT_SECRET: ${CTRADER_CLIENT_SECRET:-}
      CTRADER_ACCESS_TOKEN: ${CTRADER_ACCESS_TOKEN:-}
      CTRADER_ACCOUNT_ID: ${CTRADER_ACCOUNT_ID:-}
      CTRADER_HOST: ${CTRADER_HOST:-live.ctraderapi.com}
      CTRADER_ACCOUNT_DEMO: ${CTRADER_ACCOUNT_DEMO:-}
      CTRADER_ACCOUNT_LIVE: ${CTRADER_ACCOUNT_LIVE:-}
      DASHBOARD_LOGIN: ${DASHBOARD_LOGIN}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - trading

  frontend:
    build:
      context: ./frontend
    ports:
      - "8085:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - trading

networks:
  trading:
    driver: bridge